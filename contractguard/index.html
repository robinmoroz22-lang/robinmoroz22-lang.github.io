<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="AI ContractGuard checks contract text and files locally in your browser. Orientation only, not legal advice."
    />
    <title>AI ContractGuard | Audicore</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #030303;
        --panel: #080808;
        --panel-2: #0d0d0d;
        --line: #242424;
        --line-strong: #3a3a3a;
        --text: #f7f7f7;
        --muted: #9a9a9a;
        --soft: #626262;
        --danger: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      body {
        min-height: 100vh;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .shell {
        min-height: 100vh;
        padding: 16px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        max-width: 1180px;
        margin: 0 auto 14px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .mark {
        width: 24px;
        height: 24px;
        border: 1px solid var(--line-strong);
        border-radius: 6px;
        display: grid;
        place-items: center;
        color: var(--text);
        font-size: 13px;
        font-weight: 700;
      }

      .brand strong {
        display: block;
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
      }

      .brand span {
        display: none;
        color: var(--soft);
        font-size: 12px;
      }

      .lang {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2px;
        padding: 2px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .lang button {
        height: 30px;
        min-width: 42px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }

      .lang button.active {
        background: var(--text);
        color: #000;
      }

      .grid {
        display: grid;
        gap: 12px;
        max-width: 1180px;
        margin: 0 auto;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .panel-head {
        min-height: 54px;
        padding: 14px 14px 12px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .panel-head h1,
      .panel-head h2 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
      }

      .panel-head p {
        margin: 0;
        color: var(--soft);
        font-size: 12px;
      }

      .panel-body {
        padding: 14px;
      }

      .modes {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2px;
        padding: 2px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #000;
      }

      .modes button {
        height: 38px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
      }

      .modes button.active {
        background: var(--text);
        color: #000;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      label,
      .label {
        color: var(--muted);
        font-size: 13px;
      }

      textarea,
      select,
      input[type="text"] {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #000;
        color: var(--text);
        outline: 0;
      }

      textarea:focus,
      select:focus,
      input[type="text"]:focus {
        border-color: var(--text);
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.12);
      }

      textarea {
        min-height: 260px;
        resize: vertical;
        padding: 12px;
        line-height: 1.55;
        font-size: 14px;
      }

      select,
      input[type="text"] {
        height: 40px;
        padding: 0 10px;
      }

      .drop {
        margin-top: 12px;
        min-height: 152px;
        border: 1px dashed var(--line-strong);
        border-radius: 8px;
        background: #000;
        display: grid;
        place-items: center;
        padding: 18px;
        text-align: center;
      }

      .drop.drag {
        border-color: var(--text);
        background: #090909;
      }

      .drop strong {
        display: block;
        font-size: 14px;
        font-weight: 600;
      }

      .drop span {
        display: block;
        margin-top: 8px;
        color: var(--soft);
        font-size: 12px;
        line-height: 1.5;
      }

      .drop input {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
      }

      .file-list {
        display: grid;
        gap: 6px;
        margin-top: 10px;
      }

      .file-row,
      .notice,
      .status {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #000;
        padding: 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .status {
        margin-top: 12px;
      }

      .status.busy,
      .status.error {
        border-color: var(--line-strong);
        color: var(--text);
      }

      .file-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      .file-row span:first-child {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text);
      }

      .controls {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .check {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #000;
        padding: 10px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .check input {
        margin-top: 2px;
        accent-color: #fff;
      }

      .check.error {
        border-color: var(--text);
        color: var(--text);
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        margin-top: 12px;
      }

      .btn {
        height: 42px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: transparent;
        color: var(--text);
        font-weight: 600;
        font-size: 13px;
      }

      .btn.primary {
        border-color: var(--text);
        background: var(--text);
        color: #000;
      }

      .btn:disabled {
        cursor: not-allowed;
        border-color: var(--line);
        background: #111;
        color: #555;
      }

      .result-empty {
        min-height: 560px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: var(--soft);
        text-align: center;
        padding: 24px;
        line-height: 1.5;
      }

      .score {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 14px;
        align-items: center;
      }

      .score-ring {
        width: 86px;
        height: 86px;
        border: 1px solid var(--line-strong);
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 22px;
        font-weight: 700;
      }

      .score h3 {
        margin: 0;
        font-size: 18px;
      }

      .score p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-top: 14px;
      }

      .meta div {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #000;
        padding: 10px;
      }

      .meta span {
        display: block;
        color: var(--soft);
        font-size: 11px;
      }

      .meta strong {
        display: block;
        margin-top: 4px;
        font-size: 13px;
      }

      .findings {
        display: grid;
        gap: 8px;
        margin-top: 14px;
      }

      .priority-list {
        display: grid;
        gap: 8px;
        margin-top: 14px;
      }

      .priority {
        display: grid;
        gap: 6px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: #000;
        padding: 12px;
      }

      .priority strong {
        font-size: 13px;
      }

      .priority span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .finding {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #000;
        padding: 12px;
      }

      .finding-top {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      .finding h3 {
        margin: 0;
        font-size: 14px;
        line-height: 1.35;
      }

      .badge {
        flex: 0 0 auto;
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        padding: 3px 8px;
        color: var(--muted);
        font-size: 11px;
      }

      .finding p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .quote {
        margin-top: 10px;
        border-left: 1px solid var(--line-strong);
        padding-left: 10px;
        color: var(--soft);
        font-size: 12px;
        line-height: 1.5;
      }

      .coverage,
      .clauses,
      .questions {
        display: grid;
        gap: 8px;
        margin-top: 14px;
      }

      .finding p strong {
        color: var(--text);
        font-weight: 650;
      }

      .mini {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #000;
        padding: 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .mini strong {
        display: block;
        color: var(--text);
        margin-bottom: 4px;
      }

      .section-title {
        margin: 18px 0 8px;
        color: var(--text);
        font-size: 13px;
        font-weight: 700;
      }

      .hidden {
        display: none !important;
      }

      @media (min-width: 760px) {
        .brand span {
          display: block;
        }

        .grid {
          grid-template-columns: minmax(0, 1.05fr) minmax(340px, 0.95fr);
        }

        .actions {
          grid-template-columns: 1fr auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="mark">A</div>
          <div>
            <strong>AI ContractGuard</strong>
            <span data-i18n="tagline">Lokální orientační kontrola smluv</span>
          </div>
        </div>
        <div class="lang" aria-label="Language">
          <button type="button" class="active" data-lang="cs">CZ</button>
          <button type="button" data-lang="en">EN</button>
        </div>
      </header>

      <section class="grid">
        <div class="panel">
          <div class="panel-head">
            <h1 data-i18n="inputTitle">Smlouva</h1>
            <p data-i18n="privacy">Lokálně v prohlížeči</p>
          </div>
          <div class="panel-body">
            <div class="modes" aria-label="Input mode">
              <button type="button" class="active" data-mode="text" data-i18n="modeText">
                Text
              </button>
              <button type="button" data-mode="file" data-i18n="modeFile">Soubor</button>
              <button type="button" data-mode="photo" data-i18n="modePhoto">Foto</button>
            </div>

            <div id="textMode" class="field">
              <label for="contractText" data-i18n="textLabel">Text smlouvy</label>
              <textarea
                id="contractText"
                spellcheck="false"
                data-i18n-placeholder="textPlaceholder"
                placeholder="Vložte text smlouvy..."
              ></textarea>
            </div>

            <label id="fileMode" class="drop hidden" for="fileInput">
              <input
                id="fileInput"
                type="file"
                multiple
                accept=".pdf,.doc,.docx,.odt,.rtf,.txt,.md,.html,.htm,.xml,.eml,.csv,.xls,.xlsx,.ods,.zip,image/jpeg,image/png,image/webp,image/heic,image/heif"
              />
              <span>
                <strong data-i18n="dropTitle">Vyberte nebo přetáhněte soubory</strong>
                <span data-i18n="dropHint">PDF, DOC(X), ODT, RTF, XLSX, ZIP, JPG, PNG</span>
              </span>
            </label>

            <label id="photoMode" class="drop hidden" for="photoInput">
              <input id="photoInput" type="file" accept="image/*" capture="environment" />
              <span>
                <strong data-i18n="photoTitle">Vyfotit smlouvu</strong>
                <span data-i18n="photoHint">OCR běží v prohlížeči, může být pomalejší.</span>
              </span>
            </label>

            <div id="fileList" class="file-list"></div>

            <div class="controls">
              <div class="field">
                <label for="contractType" data-i18n="typeLabel">Typ smlouvy</label>
                <select id="contractType">
                  <option value="auto" data-i18n="typeAuto">Automaticky</option>
                  <option value="employment" data-i18n="typeEmployment">Pracovní</option>
                  <option value="lease" data-i18n="typeLease">Nájemní</option>
                  <option value="nda" data-i18n="typeNda">NDA / mlčenlivost</option>
                  <option value="service" data-i18n="typeService">Dílo / služby</option>
                  <option value="purchase" data-i18n="typePurchase">Kupní</option>
                  <option value="loan" data-i18n="typeLoan">Půjčka / úvěr</option>
                  <option value="other" data-i18n="typeOther">Jiná</option>
                </select>
              </div>

              <label class="check">
                <input id="ack" type="checkbox" />
                <span data-i18n="ack">
                  Rozumím, že výstup je jen orientační automatická kontrola, ne právní rada.
                </span>
              </label>

              <div class="notice" data-i18n="notice">
                Soubory se neposílají na server. Citlivé smlouvy přesto kontrolujte opatrně.
              </div>
            </div>

            <div id="status" class="status hidden" aria-live="polite"></div>

            <div class="actions">
              <button id="analyzeBtn" type="button" class="btn primary" data-i18n="analyze">
                Analyzovat zdarma
              </button>
              <button id="clearBtn" type="button" class="btn" data-i18n="clear">Vymazat</button>
            </div>
          </div>
        </div>

        <aside class="panel">
          <div class="panel-head">
            <h2 data-i18n="reportTitle">Report</h2>
            <p id="reportMeta">-</p>
          </div>
          <div class="panel-body">
            <div id="emptyResult" class="result-empty" data-i18n="empty">
              Vložte smlouvu a spusťte analýzu.
            </div>
            <div id="result" class="hidden"></div>
          </div>
        </aside>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.9.1/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

      const riskRules = [
        {
          id: "penalty",
          area: "sanctions",
          level: 18,
          pattern: /smluvn.?i?\s+pokut|contractual\s+penalt|penalt(y|ies)|sankc|fine/gi,
          cs: ["Smluvní pokuta", "Ověřte výši, strop a situace, kdy pokuta vzniká."],
          en: ["Contractual penalty", "Check amount, cap, and exact trigger conditions."]
        },
        {
          id: "unlimited-liability",
          area: "liability",
          level: 22,
          pattern:
            /bez\s+omezen|neomezen.{0,4}\s+odpov.{0,4}dnost|unlimited\s+liability|all\s+damages|vesker.{0,4}\s+skod/gi,

            /jednostrann.{0,3}\s+(zmen|upravit)|unilaterally\s+(change|amend)|sole\s+discretion/gi,

        },
        {
          id: "personal-data",
          area: "data",
          level: 12,
          pattern:
            /osobn.{0,3}\s+.?daj|gdpr|zpracov.{0,4}n.{0,3}\s+.?daj|personal\s+data|data\s+processing|privacy/gi,
          cs: ["Osobní údaje", "Zkontrolujte účel, role stran, zabezpečení a dobu uchování."],
          en: ["Personal data", "Check purpose, party roles, security, and retention period."]
        },
        {
          id: "payment",
          area: "payment",
          level: 11,
          pattern: /splatnost|faktur|late\s+payment|invoice|payment\s+term|urok\s+z\s+prodlen/gi,
          cs: ["Platby", "Ověřte splatnost, sankce, měnu, DPH a podmínky fakturace."],
          en: ["Payment", "Check due date, sanctions, currency, VAT, and invoicing terms."]
        },
        {
          id: "indemnity",
          area: "liability",
          level: 16,
          pattern: /odskodn|nahrad.{0,3}\s+vesker|indemnif|hold\s+harmless|defend\s+and\s+hold/gi,
          cs: ["Odškodnění", "Zúžte rozsah odškodnění na zaviněné a prokazatelné škody."],
          en: ["Indemnity", "Limit indemnity to proven losses caused by the responsible party."]
        },
        {
          id: "non-compete",
          area: "restriction",
          level: 15,
          pattern: /konkurencn.{0,3}\s+dolo.{0,3}k|zakaz\s+konkurence|non[-\s]?compete|exclusiv(e|ity)/gi,
          cs: ["Omezení konkurence / exkluzivita", "Zkontrolujte dobu, území, kompenzaci a přiměřenost omezení."],
          en: ["Non-compete / exclusivity", "Check duration, territory, compensation, and proportionality."]
        },
        {
          id: "personal-guarantee",
          area: "security",
          level: 17,
          pattern: /ru.{0,2}en|smenka|zaj.{0,4}t.{0,4}n|personal\s+guarantee|promissory\s+note|security\s+interest/gi,
          cs: ["Ručení nebo zajištění", "Ověřte, kdo ručí, do jaké výše a kdy závazek zaniká."],
          en: ["Guarantee or security", "Verify who guarantees, the cap, and when the security ends."]
        },
        {
          id: "blank",
          area: "completeness",
          level: 15,
          pattern: /_{3,}|XXX|TBD|doplnit|to\s+be\s+completed|\[\s*\]/gi,
          cs: ["Prázdné nebo nedoplněné místo", "Před podpisem doplňte všechny údaje."],
          en: ["Blank or incomplete field", "Complete all placeholders before signing."]
        }
      ];

      const typePatterns = [
        ["employment", /pracovn.{0,3}\s+smlouva|zamestnanec|employee|employment|salary|mzda/gi],
        ["lease", /najem|pronajimatel|najemce|lease|landlord|tenant|rent/gi],
        ["nda", /ml.{0,2}enlivost|duvern|confidential|non[-\s]?disclosure|nda/gi],
        ["service", /smlouva\s+o\s+dilo|dodavatel|objednatel|service|work\s+order|contractor/gi],
        ["purchase", /kupn.{0,3}\s+smlouva|prodavajic|kupujic|purchase|seller|buyer/gi],
        ["loan", /pujcka|uver|dluznik|veritel|loan|borrower|lender/gi]
      ];

      const state = {
        lang: "cs",
        mode: "text",
        files: [],
        extractedText: "",
        lastReport: null,
        processing: false
      };

      const $ = (id) => document.getElementById(id);

      function t(key) {
        return copy[state.lang][key] || key;
      }

      function setLanguage(lang) {
        state.lang = lang;
        document.documentElement.lang = lang;
        document.querySelectorAll("[data-lang]").forEach((button) => {
          button.classList.toggle("active", button.dataset.lang === lang);
        });
        document.querySelectorAll("[data-i18n]").forEach((node) => {
          node.textContent = t(node.dataset.i18n);
        });
        document.querySelectorAll("[data-i18n-placeholder]").forEach((node) => {
          node.setAttribute("placeholder", t(node.dataset.i18nPlaceholder));
        });
        if (!state.lastReport) $("reportMeta").textContent = "-";
        renderFiles();
        if (state.lastReport) {
          state.lastReport = analyze(state.lastReport.text);
          renderReport(state.lastReport);
        }
        if (!state.processing) $("analyzeBtn").textContent = t("analyze");
      }

      function setMode(mode) {
        state.mode = mode;
        document.querySelectorAll("[data-mode]").forEach((button) => {
          button.classList.toggle("active", button.dataset.mode === mode);
        });
        $("textMode").classList.toggle("hidden", mode !== "text");
        $("fileMode").classList.toggle("hidden", mode !== "file");
        $("photoMode").classList.toggle("hidden", mode !== "photo");
      }

      function status(message, show = true, kind = "info") {
        const node = $("status");
        node.textContent = message;
        node.classList.toggle("hidden", !show);
        node.classList.toggle("busy", kind === "busy");
        node.classList.toggle("error", kind === "error");
        if (show) {
          node.scrollIntoView({ block: "nearest", behavior: "smooth" });
        }
      }

      function setBusy(isBusy, message) {
        state.processing = isBusy;
        $("analyzeBtn").disabled = isBusy;
        $("clearBtn").disabled = isBusy;
        $("analyzeBtn").textContent = isBusy ? message : t("analyze");
      }

      function setAckError(hasError) {
        $("ack").closest(".check").classList.toggle("error", hasError);
      }

      function formatBytes(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${Math.round(bytes / 1024)} KB`;
        return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
      }

      function renderFiles() {
        const root = $("fileList");
        root.innerHTML = "";
        state.files.forEach((file) => {
          const row = document.createElement("div");
          row.className = "file-row";
          row.innerHTML = `<span>${escapeHtml(file.name)}</span><span>${formatBytes(file.size)}</span>`;
          root.appendChild(row);
        });
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function cleanText(value) {
        return String(value || "")
          .replace(/\u0000/g, " ")
          .replace(/[ \t]+\n/g, "\n")
          .replace(/\n{4,}/g, "\n\n\n")
          .replace(/[ \t]{2,}/g, " ")
          .trim();
      }

      function foldText(value) {
        return String(value || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[�]/g, "?")
          .toLowerCase();
      }

      function extension(fileName) {
        return String(fileName).toLowerCase().split(".").pop() || "";
      }

      function stripMarkup(value) {
        const doc = new DOMParser().parseFromString(String(value || ""), "text/html");
        return cleanText(doc.body?.textContent || String(value).replace(/<[^>]+>/g, " "));
      }

      function decodeBuffer(buffer, encoding) {
        try {
          return new TextDecoder(encoding, { fatal: false }).decode(buffer);
        } catch {
          return "";
        }
      }

      function readableScore(value) {
        const cleaned = String(value || "").replace(/[^\p{L}\p{N}\s.,;:!?()[\]\/\-+%§]/gu, " ");
        const words = cleaned.match(/[\p{L}\p{N}]{2,}/gu) || [];
        const noise = (cleaned.match(/[�\u0000-\u0008\u000b\u000c\u000e-\u001f]/g) || []).length;
        return words.length * 4 - noise * 10 + cleanText(cleaned).length / 120;
      }

      function bestTextFromBuffer(buffer) {
        const candidates = ["utf-8", "windows-1250", "windows-1252", "utf-16le"]
          .map((encoding) => decodeBuffer(buffer, encoding))
          .filter(Boolean)
          .map((text) => ({
            text: cleanText(
              text
                .replace(/[^\p{L}\p{N}\s.,;:!?()[\]\/\-+%§]/gu, " ")
                .replace(/\s{2,}/g, " ")
            ),
            score: readableScore(text)
          }))
          .sort((a, b) => b.score - a.score);

        return candidates[0]?.text || "";
      }

      async function readTextFile(file) {
        return cleanText(await file.text());
      }

      async function readHtmlFile(file) {
        return stripMarkup(await file.text());
      }

      function stripRtf(value) {
        return cleanText(
          String(value || "")
            .replace(/\\'[0-9a-fA-F]{2}/g, " ")
            .replace(/\\[a-z]+-?\d* ?/gi, " ")
            .replace(/[{}]/g, " ")
        );
      }

      async function readRtfFile(file) {
        return stripRtf(await file.text());
      }

      async function readLegacyDoc(file) {
        return bestTextFromBuffer(await file.arrayBuffer());
      }

      async function readSpreadsheet(file) {
        if (!window.XLSX) throw new Error("Spreadsheet parser is not loaded.");
        const workbook = window.XLSX.read(await file.arrayBuffer(), { type: "array" });
        const parts = workbook.SheetNames.slice(0, 12).map((name) => {
          const sheet = workbook.Sheets[name];
          return window.XLSX.utils.sheet_to_csv(sheet, { blankrows: false });
        });
        return cleanText(parts.join("\n\n"));
      }

      async function readPdf(file) {
        const pdfjs = await import("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs");
        pdfjs.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.worker.min.mjs";
        const buffer = await file.arrayBuffer();
        const pdf = await pdfjs.getDocument({ data: buffer }).promise;
        const pages = [];
        const maxPages = Math.min(pdf.numPages, 80);
        for (let pageNumber = 1; pageNumber <= maxPages; pageNumber += 1) {
          const page = await pdf.getPage(pageNumber);
          const content = await page.getTextContent();
          pages.push(content.items.map((item) => item.str || "").join(" "));
        }
        return cleanText(pages.join("\n\n"));
      }

      async function readDocx(file) {
        if (!window.mammoth) throw new Error("DOCX parser is not loaded.");
        const result = await window.mammoth.extractRawText({
          arrayBuffer: await file.arrayBuffer()
        });
        return cleanText(result.value || "");
      }

      async function readOdt(file) {
        if (!window.JSZip) throw new Error("ODT parser is not loaded.");
        const zip = await window.JSZip.loadAsync(await file.arrayBuffer());
        const content = zip.file("content.xml");
        if (!content) return "";
        return stripMarkup(await content.async("text"));
      }

      async function readImage(file) {
        if (!window.Tesseract) throw new Error("OCR is not loaded.");
        setBusy(true, t("ocr"));
        status(t("ocr"), true, "busy");
        try {
          const result = await window.Tesseract.recognize(file, "ces+eng", {
            logger: () => {}
          });
          return cleanText(result?.data?.text || "");
        } catch {
          const result = await window.Tesseract.recognize(file, "eng", {
            logger: () => {}
          });
          return cleanText(result?.data?.text || "");
        }
      }

      async function readZip(file) {
        if (!window.JSZip) throw new Error("ZIP parser is not loaded.");
        const zip = await window.JSZip.loadAsync(await file.arrayBuffer());
        const parts = [];
        const entries = Object.values(zip.files)
          .filter((entry) => !entry.dir)
          .slice(0, 40);

        for (const entry of entries) {
          const ext = extension(entry.name);
          if (["txt", "md", "csv", "eml"].includes(ext)) {
            parts.push(await entry.async("text"));
          } else if (ext === "rtf") {
            parts.push(stripRtf(await entry.async("text")));
          } else if (["html", "htm", "xml"].includes(ext)) {
            parts.push(stripMarkup(await entry.async("text")));
          } else if (ext === "doc") {
            parts.push(bestTextFromBuffer(await entry.async("arraybuffer")));
          } else if (["xls", "xlsx", "ods"].includes(ext)) {
            const blob = new File([await entry.async("arraybuffer")], entry.name);
            parts.push(await readSpreadsheet(blob));
          } else if (ext === "docx") {
            const blob = new File([await entry.async("arraybuffer")], entry.name);
            parts.push(await readDocx(blob));
          } else if (ext === "odt") {
            const blob = new File([await entry.async("arraybuffer")], entry.name);
            parts.push(await readOdt(blob));
          } else if (ext === "pdf") {
            const blob = new File([await entry.async("arraybuffer")], entry.name, {
              type: "application/pdf"
            });
            parts.push(await readPdf(blob));
          }
        }

        return cleanText(parts.join("\n\n"));
      }

      async function extractFiles(files) {
        const parts = [];
        const failures = [];
        for (const file of files) {
          try {
            const ext = extension(file.name);
            let extracted = "";
            if (file.size > 20 * 1024 * 1024) {
              failures.push(`${file.name}: >20 MB`);
            } else if (["txt", "md", "csv", "eml"].includes(ext)) {
              extracted = await readTextFile(file);
            } else if (ext === "rtf") {
              extracted = await readRtfFile(file);
            } else if (["html", "htm", "xml"].includes(ext)) {
              extracted = await readHtmlFile(file);
            } else if (ext === "doc") {
              extracted = await readLegacyDoc(file);
            } else if (["xls", "xlsx", "ods"].includes(ext)) {
              extracted = await readSpreadsheet(file);
            } else if (ext === "pdf" || file.type === "application/pdf") {
              extracted = await readPdf(file);
            } else if (ext === "docx") {
              extracted = await readDocx(file);
            } else if (ext === "odt") {
              extracted = await readOdt(file);
            } else if (ext === "zip") {
              extracted = await readZip(file);
            } else if (file.type.startsWith("image/")) {
              extracted = await readImage(file);
            } else {
              failures.push(`${file.name}: unsupported`);
            }

            if (cleanText(extracted)) {
              parts.push(extracted);
            } else if (!failures.some((item) => item.startsWith(`${file.name}:`))) {
              failures.push(`${file.name}: empty text`);
            }
          } catch (error) {
            failures.push(
              `${file.name}: ${error instanceof Error ? error.message : "unknown"}`
            );
          }
        }

        const text = cleanText(parts.join("\n\n"));
        if (!text) {
          const detail = failures.length ? ` (${failures[0]})` : "";
          throw new Error(`${t("noReadableText")}${detail}`);
        }

        if (failures.length) {
          status(`${t("readFailed")}: ${failures[0]}`, true, "error");
        }

        return text;
      }

      function detectType(text) {
        const manual = $("contractType").value;
        if (manual !== "auto") return manual;

        let best = ["other", 0];
        for (const [type, pattern] of typePatterns) {
          const count = [...text.matchAll(pattern)].length;
          if (count > best[1]) best = [type, count];
        }
        return best[0];
      }

      function typeLabel(type) {
        const map = {
          employment: t("typeEmployment"),
          lease: t("typeLease"),
          nda: t("typeNda"),
          service: t("typeService"),
          purchase: t("typePurchase"),
          loan: t("typeLoan"),
          other: t("typeOther")
        };
        return map[type] || map.other;
      }

      function excerpt(text, index) {
        const start = Math.max(0, index - 90);
        const end = Math.min(text.length, index + 150);
        return cleanText(`${start > 0 ? "..." : ""}${text.slice(start, end)}${end < text.length ? "..." : ""}`);
      }

      function findClauses(text) {
        const chunks = text
          .split(/\n\s*\n|(?=\b\d+[\).\s])|(?=\b[A-ZÁ-Ž][A-ZÁ-Ž ]{5,}\b)/)
          .map(cleanText)
          .filter((part) => part.length > 80)
          .slice(0, 6);

        return chunks.map((part) => {
          const type = detectClauseType(part);
          return {
            type,
            title: type,
            excerpt: part.slice(0, 360)
          };
        });
      }

      function detectClauseType(value) {
        const folded = foldText(value);
        if (/splatnost|payment|invoice|faktur/.test(folded)) return "payment";
        if (/odpov.{0,4}dnost|liability|damage/.test(folded)) return "liability";
        if (/ml.{0,2}enlivost|confidential|nda/.test(folded)) return "confidentiality";
        if (/ukon.{0,3}en|vypov|termination/.test(folded)) return "termination";
        if (/osobn.{0,3}\s+.?daj|gdpr|personal\s+data/.test(folded)) return "data";
        return "general";
      }

      function severityLabel(level) {
        if (level >= 17) return state.lang === "cs" ? "vysoké" : "high";
        if (level >= 13) return state.lang === "cs" ? "střední" : "medium";
        return state.lang === "cs" ? "nižší" : "lower";
      }

      function whyForFinding(id) {
        const map = {

      function sectionDefinitions(contractType) {
        const base = [
          { id: "parties", required: true, cs: "Smluvní strany", en: "Parties", patterns: [/smluvn.?i?\s+stran|mezi|party|parties|between/] },
          { id: "subject", required: true, cs: "Předmět plnění", en: "Subject / scope", patterns: [/p.{0,2}edm.{0,4}t|predm.{0,4}t|scope|subject|pln.{0,4}n|services|deliverables/] },
          { id: "price", required: true, cs: "Cena a platby", en: "Price and payment", patterns: [/cena|odmena|splatnost|faktur|payment|price|fee|invoice|rent|salary/] },
          { id: "term", required: true, cs: "Doba trvání / účinnost", en: "Term / effective date", patterns: [/doba\s+trv.{0,4}n|ucinnost|platnost|term|duration|effective/] },
          { id: "termination", required: true, cs: "Ukončení", en: "Termination", patterns: [/ukon.{0,3}en|vypov|odstoupen|termination|notice|withdraw/] },
          { id: "liability", required: true, cs: "Odpovědnost a náhrada škody", en: "Liability and damages", patterns: [/odpov.{0,4}dnost|nahrada\s+skody|liability|damage/] },
          { id: "disputes", required: true, cs: "Právo a řešení sporů", en: "Law and disputes", patterns: [/rozhodn.{0,3}\s+pr.{0,2}vo|p.{0,3}slusn|soud|jurisdiction|governing\s+law|dispute|court|arbitration/] },
          { id: "signatures", required: true, cs: "Podpisy / datum", en: "Signatures / date", patterns: [/podpis|podeps|datum|signature|signed|date/i] },
          { id: "confidentiality", required: false, cs: "Mlčenlivost", en: "Confidentiality", patterns: [/ml.{0,2}enlivost|duvern|confidential|nda/] },
          { id: "personal-data", required: false, cs: "Osobní údaje", en: "Personal data", patterns: [/osobn.{0,3}\s+.?daj|gdpr|personal\s+data|privacy|data\s+processing/] }
        ];

        const specific = {
          lease: [
            { id: "deposit", required: true, cs: "Kauce / jistota", en: "Deposit", patterns: [/kauce|jistota|deposit|security/] },
            { id: "handover", required: true, cs: "Předání a opravy", en: "Handover and repairs", patterns: [/pred.{0,3}n|opravy|udrzba|handover|repair|maintenance/] }
          ],
          employment: [
            { id: "role", required: true, cs: "Druh práce a místo", en: "Role and workplace", patterns: [/druh\s+prace|misto\s+vykonu|role|position|workplace/] },
            { id: "worktime", required: true, cs: "Pracovní doba", en: "Working time", patterns: [/pracovn.{0,3}\s+doba|working\s+time|hours/] }
          ],
          nda: [
            { id: "secret-definition", required: true, cs: "Definice důvěrných informací", en: "Definition of confidential information", patterns: [/duvern.{0,3}\s+informace|confidential\s+information/] },
            { id: "exceptions", required: true, cs: "Výjimky z mlčenlivosti", en: "Confidentiality exclusions", patterns: [/vyjimk|exclusion|exception|publicly\s+known/] }
          ],
          service: [
            { id: "acceptance", required: true, cs: "Předání a akceptace", en: "Delivery and acceptance", patterns: [/akceptac|pred.{0,3}n|acceptance|handover|delivery/] },
            { id: "change-requests", required: false, cs: "Změnové požadavky", en: "Change requests", patterns: [/zmenov|change\s+request|scope\s+change/] }
          ],
          purchase: [
            { id: "delivery", required: true, cs: "Dodání a vlastnictví", en: "Delivery and ownership", patterns: [/dod.{0,3}n|vlastnictv|delivery|ownership|title/] },
            { id: "warranty", required: true, cs: "Záruka / vady", en: "Warranty / defects", patterns: [/zaruk|vad|reklamac|warranty|defect|claim/] }
          ],
          loan: [
            { id: "repayment", required: true, cs: "Splátky a úrok", en: "Repayment and interest", patterns: [/splatk|urok|repayment|interest/] },
            { id: "default", required: true, cs: "Prodlení a zesplatnění", en: "Default and acceleration", patterns: [/prodlen|zesplat|default|acceleration/] }
          ]
        };

        return [...base, ...(specific[contractType] || [])].slice(0, 12);
      }

      function buildCoverage(text, contractType) {
        const folded = foldText(text);
        return sectionDefinitions(contractType).map((section) => ({
          id: section.id,
          label: section[state.lang],
          required: section.required,
          present: section.patterns.some((pattern) => pattern.test(folded))
        }));
      }

      function buildPriorities(findings, coverage) {
        const priorities = findings.slice(0, 3).map((finding) => ({
          title: finding.title,
          detail: finding.recommendation
        }));

        coverage
          .filter((item) => item.required && !item.present)
          .slice(0, Math.max(0, 3 - priorities.length))
          .forEach((item) => {
            priorities.push({
              title: `${t("missing")}: ${item.label}`,
              detail:
                state.lang === "cs"
                  ? "Doplňte nebo ověřte tuto část před podpisem."
                  : "Add or verify this section before signing."
            });
          });

        if (!priorities.length) {
          priorities.push({
            title: state.lang === "cs" ? "Rychlá ruční kontrola" : "Quick manual check",
            detail: t("noPriorities")
          });
        }

        return priorities;
      }

      function buildProfessionalSummary(risk, findings, coverage) {
        const base = t(`summary${risk[0].toUpperCase()}${risk.slice(1)}`);
        const missingCount = coverage.filter((item) => item.required && !item.present).length;
        if (findings[0] && missingCount) {
          return state.lang === "cs"
            ? `${base} Priorita: ${findings[0].title}. Chybí ověřit ${missingCount} částí.`
            : `${base} Priority: ${findings[0].title}. ${missingCount} sections need verification.`;
        }
        if (findings[0]) {
          return state.lang === "cs"
            ? `${base} Priorita: ${findings[0].title}.`
            : `${base} Priority: ${findings[0].title}.`;
        }
        if (missingCount) {
          return state.lang === "cs"
            ? `${base} Chybí ověřit ${missingCount} částí.`
            : `${base} ${missingCount} sections need verification.`;
        }
        return base;
      }

      function analyze(text) {
        const normalized = cleanText(text).slice(0, 180000);
        const searchable = foldText(normalized);
        const contractType = detectType(searchable);
        const findings = [];
        const seen = new Set();

        for (const rule of riskRules) {
          const matches = [...searchable.matchAll(rule.pattern)];
          if (matches.length && !seen.has(rule.id)) {
            seen.add(rule.id);
            const [title, recommendation] = rule[state.lang];
            findings.push({
              id: rule.id,
              area: rule.area,
              level: rule.level,
              title,
              recommendation,
              why: whyForFinding(rule.id),
              severity: severityLabel(rule.level),
              quote: excerpt(normalized, matches[0].index || 0),
              confidence: Math.min(0.92, 0.56 + matches.length * 0.08)
            });
          }
        }

        findings.sort((a, b) => b.level - a.level);
        const coverage = buildCoverage(normalized, contractType);
        const missingRequired = coverage.filter((item) => item.required && !item.present).length;
        const penalty = findings.reduce((sum, item) => sum + item.level, 0) + missingRequired * 4;
        const score = Math.max(0, Math.min(100, 100 - penalty));
        const risk = score < 55 ? "high" : score < 78 ? "medium" : "low";
        const confidence = Math.min(
          0.94,
          0.52 + Math.min(normalized.length, 20000) / 100000 + findings.length * 0.035
        );
        const clauses = findClauses(normalized);
        const priorities = buildPriorities(findings, coverage);
        const questions = buildQuestions(findings, contractType, coverage);

        return {
          text: normalized,
          type: contractType,
          findings,
          coverage,
          priorities,
          clauses,
          questions,
          score,
          risk,
          confidence,
          summary: buildProfessionalSummary(risk, findings, coverage)
        };
      }

      function buildQuestions(findings, contractType, coverage) {
        const base =
          state.lang === "cs"
            ? [
                "Co přesně se stane při porušení smlouvy?",
                "Jak lze smlouvu ukončit bez nepřiměřených nákladů?",
                "Které přílohy a částky musí být doplněné před podpisem?"
              ]
            : [
                "What exactly happens after a breach?",
                "How can the contract be terminated without disproportionate cost?",
                "Which attachments and amounts must be completed before signing?"
              ];

        if (contractType === "lease") {
          base.unshift(state.lang === "cs" ? "Jak se řeší kauce, opravy a předání?" : "How are deposit, repairs, and handover handled?");
        }
        if (contractType === "employment") {
          base.unshift(state.lang === "cs" ? "Sedí pracovní doba, mzda a konkurenční omezení?" : "Do working time, salary, and non-compete limits fit?");
        }

        coverage
          .filter((item) => item.required && !item.present)
          .slice(0, 2)
          .forEach((item) => {
            base.push(
              state.lang === "cs"
                ? `Kde je ve smlouvě upraveno: ${item.label}?`
                : `Where does the contract cover: ${item.label}?`
            );
          });

        findings.slice(0, 2).forEach((finding) => {
          base.push(
            state.lang === "cs"
              ? `Je bod "${finding.title}" vyvážený pro obě strany?`
              : `Is "${finding.title}" balanced for both parties?`
          );
        });
        return [...new Set(base)].slice(0, 6);
      }

      function riskLabel(risk) {
        if (risk === "high") return t("high");
        if (risk === "medium") return t("medium");
        return t("low");
      }

      function renderReport(report) {
        state.lastReport = report;
        $("emptyResult").classList.add("hidden");
        $("result").classList.remove("hidden");
        $("reportMeta").textContent = `${t("done")} · ${t("localMethod")}`;

        const priorities = report.priorities
          .map(
            (priority) => `
              <article class="priority">
                <strong>${escapeHtml(priority.title)}</strong>
                <span>${escapeHtml(priority.detail)}</span>
              </article>
            `
          )
          .join("");

        const findings =
          report.findings.length > 0
            ? report.findings
                .map(
                  (finding) => `
              <article class="finding">
                <div class="finding-top">
                  <h3>${escapeHtml(finding.title)}</h3>
                  <span class="badge">${escapeHtml(finding.severity)} · ${Math.round(finding.confidence * 100)}%</span>
                </div>
                <p><strong>${escapeHtml(t("whyItMatters"))}:</strong> ${escapeHtml(finding.why)}</p>
                <p><strong>${escapeHtml(t("suggestedAction"))}:</strong> ${escapeHtml(finding.recommendation)}</p>
                <div class="quote">${escapeHtml(finding.quote)}</div>
              </article>
            `
                )
                .join("")
            : `<div class="mini">${escapeHtml(t("noFindings"))}</div>`;

        const requiredCoverage = report.coverage.filter((item) => item.required);
        const foundRequired = requiredCoverage.filter((item) => item.present).length;
        const missingCoverage = requiredCoverage.filter((item) => !item.present);
        const optionalFound = report.coverage.filter((item) => !item.required && item.present).slice(0, 3);
        const coverageRows = [
          {
            label: `${t("present")}: ${foundRequired}/${requiredCoverage.length}`,
            detail:
              state.lang === "cs"
                ? "Základní části smlouvy nalezené v textu."
                : "Core contract sections found in the text."
          },
          ...missingCoverage.slice(0, 6).map((item) => ({
            label: `${t("missing")}: ${item.label}`,
            detail:
              state.lang === "cs"
                ? "Před podpisem ověřte nebo doplňte."
                : "Verify or add before signing."
          })),
          ...optionalFound.map((item) => ({
            label: `${t("present")}: ${item.label}`,
            detail:
              state.lang === "cs"
                ? "Doplňková část nalezená v textu."
                : "Additional section found in the text."
          }))
        ];
        const coverage = coverageRows
          .map(
            (item) => `
              <div class="mini">
                <strong>${escapeHtml(item.label)}</strong>
                ${escapeHtml(item.detail)}
              </div>
            `
          )
          .join("");

        $("result").innerHTML = `
          <div class="score">
            <div class="score-ring">${report.score}</div>
            <div>
              <h3>${escapeHtml(riskLabel(report.risk))}</h3>
              <p>${escapeHtml(report.summary)}</p>
            </div>
          </div>

          <div class="meta">
            <div><span>${escapeHtml(t("type"))}</span><strong>${escapeHtml(typeLabel(report.type))}</strong></div>
            <div><span>${escapeHtml(t("confidence"))}</span><strong>${Math.round(report.confidence * 100)}%</strong></div>
            <div><span>${escapeHtml(t("chars"))}</span><strong>${report.text.length.toLocaleString()}</strong></div>
          </div>

          <h3 class="section-title">${escapeHtml(t("priorities"))}</h3>
          <div class="priority-list">${priorities}</div>

          <h3 class="section-title">${escapeHtml(t("findings"))}</h3>
          <div class="findings">${findings}</div>

          <h3 class="section-title">${escapeHtml(t("coverage"))}</h3>
          <div class="coverage">${coverage}</div>

          <h3 class="section-title">${escapeHtml(t("clauses"))}</h3>
          <div class="clauses">
            ${report.clauses
              .map(
                (clause) =>
                  `<div class="mini"><strong>${escapeHtml(clause.title)}</strong>${escapeHtml(clause.excerpt)}</div>`
              )
              .join("") || `<div class="mini">-</div>`}
          </div>

          <h3 class="section-title">${escapeHtml(t("questions"))}</h3>
          <div class="questions">
            ${report.questions.map((question) => `<div class="mini">${escapeHtml(question)}</div>`).join("")}
          </div>

          <div class="actions">
            <button type="button" class="btn" id="downloadReport">${escapeHtml(t("download"))}</button>
          </div>
        `;

        $("downloadReport").addEventListener("click", () => downloadReport(report));
      }

      function downloadReport(report) {
        const lines = [
          "AI ContractGuard",
          `${t("score")}: ${report.score}/100`,
          `${t("type")}: ${typeLabel(report.type)}`,
          `${t("confidence")}: ${Math.round(report.confidence * 100)}%`,
          "",
          report.summary,
          "",
          t("priorities"),
          ...report.priorities.map((priority) => `- ${priority.title}: ${priority.detail}`),
          "",
          t("findings"),
          ...report.findings.map(
            (finding) =>
              `- ${finding.title} (${finding.severity}, ${Math.round(finding.confidence * 100)}%): ${finding.recommendation}`
          ),
          "",
          t("coverage"),
          ...report.coverage.map((item) => `- ${item.present ? t("present") : t("missing")}: ${item.label}`),
          "",
          t("questions"),
          ...report.questions.map((question) => `- ${question}`),
          "",
          state.lang === "cs" ? "Jen orientace. Nejde o právní radu." : "Orientation only. Not legal advice."
        ];
        const blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "contractguard-report.txt";
        link.click();
        URL.revokeObjectURL(url);
      }

      async function runAnalysis() {
        if (state.processing) return;

        if (!$("ack").checked) {
          setAckError(true);
          status(t("missingAck"), true, "error");
          return;
        }

        setAckError(false);

        try {
          setBusy(true, state.files.length ? t("extracting") : t("analyzing"));
          status(state.files.length ? t("extracting") : t("analyzing"), true, "busy");
          let text = $("contractText").value;
          if (state.files.length) {
            text = await extractFiles(state.files);
            state.extractedText = text;
            $("contractText").value = text;
          }

          text = cleanText(text);
          if (!text) {
            status(t("missingText"), true, "error");
            return;
          }
          if (text.length > 180000) {
            status(t("tooLarge"), true, "error");
            return;
          }

          setBusy(true, t("analyzing"));
          status(t("analyzing"), true, "busy");
          const report = analyze(text);
          renderReport(report);
          status("", false);
        } catch (error) {
          status(error instanceof Error ? error.message : "Error", true, "error");
        } finally {
          setBusy(false);
        }
      }

      function clearAll() {
        state.files = [];
        state.extractedText = "";
        state.lastReport = null;
        $("contractText").value = "";
        $("fileInput").value = "";
        $("photoInput").value = "";
        $("ack").checked = false;
        $("contractType").value = "auto";
        $("result").classList.add("hidden");
        $("emptyResult").classList.remove("hidden");
        $("reportMeta").textContent = "-";
        setAckError(false);
        setBusy(false);
        renderFiles();
        status("", false);
      }

      document.querySelectorAll("[data-lang]").forEach((button) => {
        button.addEventListener("click", () => setLanguage(button.dataset.lang));
      });
      document.querySelectorAll("[data-mode]").forEach((button) => {
        button.addEventListener("click", () => setMode(button.dataset.mode));
      });

      $("fileInput").addEventListener("change", (event) => {
        state.files = Array.from(event.target.files || []);
        renderFiles();
        if (state.files.length) status(t("selectedReady"), true, "busy");
      });
      $("photoInput").addEventListener("change", (event) => {
        state.files = Array.from(event.target.files || []);
        renderFiles();
        if (state.files.length) status(t("selectedReady"), true, "busy");
      });

      ["fileMode", "photoMode"].forEach((id) => {
        const zone = $(id);
        zone.addEventListener("dragover", (event) => {
          event.preventDefault();
          zone.classList.add("drag");
        });
        zone.addEventListener("dragleave", () => zone.classList.remove("drag"));
        zone.addEventListener("drop", (event) => {
          event.preventDefault();
          zone.classList.remove("drag");
          state.files = Array.from(event.dataTransfer.files || []);
          renderFiles();
          if (state.files.length) status(t("selectedReady"), true, "busy");
        });
      });

      $("analyzeBtn").addEventListener("click", runAnalysis);
      $("clearBtn").addEventListener("click", clearAll);
      $("ack").addEventListener("change", () => {
        if ($("ack").checked) setAckError(false);
      });

      setLanguage("cs");
    </script>
  </body>
</html>
