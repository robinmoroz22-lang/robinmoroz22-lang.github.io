        };
        return actions[id]?.[state.lang] || (state.lang === "cs" ? "Doplňte tuto část před podpisem." : "Add this section before signing.");
      }

      function actionForFinding(id, contractType) {
        const lease = {
          payment: {
            cs: "U sankcí za prodlení ověřte procento, od kdy běží, strop a zda nejde o nepřiměřený poplatek.",
            en: "For late-payment sanctions, verify rate, start date, cap, and proportionality."
          },
          penalty: {
            cs: "U smluvní pokuty ověřte přesný spouštěč, výši, strop a zda lze porušení napravit.",
            en: "For a penalty, verify trigger, amount, cap, and whether the breach can be cured."
          },
          termination: {
            cs: "U ukončení ověřte výpovědní lhůtu, důvody a finanční následky.",
            en: "For termination, verify notice period, grounds, and financial consequences."
          },
          blank: {
            cs: "Doplňte prázdná pole a přílohy ještě před podpisem, hlavně částky, datumy a identifikaci bytu.",
            en: "Complete blanks and attachments before signing, especially amounts, dates, and unit details."
          },
          "personal-data": {
            cs: "Ověřte, jaké osobní údaje se zpracují, proč a jak dlouho se uchovají.",
            en: "Verify which personal data is processed, why, and for how long."
          }
        };
        const generic = {
          "personal-guarantee": {
            cs: "U ručení ověřte osobu ručitele, limit, dobu trvání a zánik zajištění.",
            en: "For a guarantee, verify guarantor, cap, duration, and release."
          },
          "unlimited-liability": {
            cs: "Navrhněte finanční strop odpovědnosti a vyloučení nepřímých škod.",
            en: "Propose a liability cap and exclusion of indirect damages."
          },
          "unilateral-change": {
            cs: "Požadujte oznámení změny, souhlas nebo právo smlouvu ukončit.",
            en: "Require notice, consent, or an exit right for changes."
          }
        };
        const source = contractType === "lease" ? { ...generic, ...lease } : generic;
        return source[id]?.[state.lang] || null;
      }

      function buildActions(findings, coverage, contractType) {
        const actions = [];
        findings.slice(0, 4).forEach((finding) => {
          actions.push(actionForFinding(finding.id, contractType) || finding.recommendation);
        });
        coverage
          .filter((item) => item.required && !item.present)
          .slice(0, 4)
          .forEach((item) => {
            actions.push(contractType === "lease" ? leaseActionForMissing(item.id) : (state.lang === "cs" ? `Doplňte nebo ověřte část: ${item.label}.` : `Add or verify: ${item.label}.`));
          });

        if (!actions.length) {
          actions.push(
            state.lang === "cs"
              ? "Před podpisem ručně ověřte strany, částky, datumy, ukončení, odpovědnost a přílohy."
              : "Before signing, manually verify parties, amounts, dates, termination, liability, and attachments."
          );
        }

        return [...new Set(actions)].slice(0, 5);
      }

      function parseAmount(value) {
        const cleaned = String(value || "")
          .replace(/\s/g, "")
          .replace(/\.(?=\d{3}(\D|$))/g, "")
          .replace(/[^\d,.-]/g, "")
          .replace(",", ".");
        const parsed = Number.parseFloat(cleaned);
        return Number.isFinite(parsed) ? parsed : null;
      }

      function formatAmount(amount, currency = "Kč") {
        if (!Number.isFinite(amount)) return "-";
        return `${Math.round(amount).toLocaleString(state.lang === "cs" ? "cs-CZ" : "en-US")} ${currency}`;
      }

      function moneyKind(context) {
        const folded = foldText(context);
        if (/kauce|jistot|deposit/.test(folded)) return "deposit";
        if (/sluz|zalo|vodne|stocne|energie|teplo|service|utilities/.test(folded)) return "services";
        if (/najemn|rent/.test(folded)) return "rent";
        if (/pokut|sankc|prodlen|dluzn|penalt|late|fee/.test(folded)) return "penalty";
        if (/cena|odmena|price|fee|payment|castka|amount/.test(folded)) return "price";
        return "amount";
      }

      function contextKindBeforeAfter(before, after) {
        const beforeKind = moneyKind(before);
        if (beforeKind !== "amount") return beforeKind;
        return moneyKind(after);
      }

      function moneyKindLabel(kind) {
        const labels = {
          rent: ["Nájem / cena", "Rent / price"],
          services: ["Služby / zálohy", "Services / advances"],
          deposit: ["Kauce / jistota", "Deposit / security"],
          penalty: ["Sankce / poplatek", "Penalty / fee"],
          price: ["Cena / platba", "Price / payment"],
          percent: ["Procento", "Percentage"],
          date: ["Datum", "Date"],
          amount: ["Částka", "Amount"]
        };
        const pair = labels[kind] || labels.amount;
        return state.lang === "cs" ? pair[0] : pair[1];
      }

      function isLikelyReferenceNumber({ amount, raw, hasCurrency, context }) {
        const folded = foldText(context);
        const compact = String(raw || "").replace(/\D/g, "");

        if (!hasCurrency && amount !== null && amount > 1000000) return true;
        if (!hasCurrency && /^0\d{3,}$/.test(compact)) return true;
        if (/telefon|phone|tel\.?|\+420|e-mail|email/.test(folded)) return true;
        if (/ucet|cislo\s+uctu|bank|iban|variabiln|symbol|vs\b|csob|veden.{0,3}\s+u/.test(folded)) return true;
        if (/§\s*$/.test(context.slice(0, Math.max(0, context.indexOf(raw))))) return true;
        if (/§\s*\d{3,5}|obcanskeho\s+zakoniku|civil\s+code|section\s+\d{3,5}/.test(folded)) return true;

        return false;
      }

      function extractNumbersAndDates(text) {
        const items = [];
        const seen = new Set();
        const moneyPattern = /(\d{1,3}(?:[ .]\d{3})+|\d{4,}|\d{1,3})(?:[,.]\d{1,2})?\s*(?:,-)?\s*(Kč|CZK|EUR|€|USD|\$)?/gi;
        let match;
        while ((match = moneyPattern.exec(text)) && items.length < 10) {
          const raw = cleanText(match[0]);
          if (/^\d{1,2}\.\s*$/.test(raw)) continue;
          const amount = parseAmount(raw);
          const hasCurrency = Boolean(match[2]) || /Kč|CZK|EUR|€|USD|\$/i.test(raw);
          const before = text.slice(Math.max(0, match.index - 70), match.index);
          const after = text.slice(match.index, Math.min(text.length, match.index + 90));
          const context = `${before}${after}`;
          if (/rodn.{0,3}\s+.{0,3}slo|birth\s+number|personal\s+id/i.test(foldText(context))) continue;
          const kind = contextKindBeforeAfter(before, after);
          if (isLikelyReferenceNumber({ amount, raw, hasCurrency, context })) continue;
          if (!hasCurrency && amount !== null && amount < 1000) continue;
          if (!hasCurrency && kind === "amount") continue;
          if (amount !== null && amount >= 1900 && amount <= 2100 && !hasCurrency && kind === "amount") continue;
          const key = `${kind}:${amount}:${match[2] || "Kč"}`;
          if (seen.has(key)) continue;
          seen.add(key);
          items.push({
            kind,
            label: moneyKindLabel(kind),
            value: formatAmount(amount, match[2] || "Kč"),
            amount,
            quote: excerpt(text, match.index)
          });
        }

        const percentPattern = /\b\d+(?:[,.]\d+)?\s*%/g;
        while ((match = percentPattern.exec(text)) && items.length < 14) {
          const context = text.slice(Math.max(0, match.index - 90), Math.min(text.length, match.index + 130));
          const key = `percent:${match[0]}`;
          if (seen.has(key)) continue;
          seen.add(key);
          items.push({
            kind: "percent",
            label: moneyKindLabel("percent"),
            value: match[0],
            amount: parseAmount(match[0]),
            quote: excerpt(text, match.index),
            contextKind: moneyKind(context)
          });
        }

        const datePattern = /\b\d{1,2}\.\s*\d{1,2}\.\s*\d{4}\b|\b\d{4}-\d{2}-\d{2}\b/g;
        while ((match = datePattern.exec(text)) && items.length < 18) {
          const key = `date:${match[0]}`;
          if (seen.has(key)) continue;
          seen.add(key);
          items.push({
            kind: "date",
            label: moneyKindLabel("date"),
            value: cleanText(match[0]),
            quote: excerpt(text, match.index)
          });
        }

        return items;
      }

      function buildLegalBenchmarks(contractType, extracts, findings) {
        const benchmarks = [];
        if (contractType !== "lease") return benchmarks;

        const rent = extracts.find((item) => item.kind === "rent" && Number.isFinite(item.amount));
        const deposit = extracts.find((item) => item.kind === "deposit" && Number.isFinite(item.amount));
        const penaltySignal = findings.some((finding) => ["penalty", "payment"].includes(finding.id)) || extracts.some((item) => item.kind === "penalty" || item.contextKind === "penalty");
        const sourceUrl = "https://www.iparagraf.cz/89/2012/2254/";

        if (rent && deposit) {
          const ratio = deposit.amount / rent.amount;
          if (ratio > 3) {
            benchmarks.push({
              level: "high",
              title: state.lang === "cs" ? "Kauce je nad trojnásobkem nájemného" : "Deposit is above three months of rent",
              detail:
                state.lang === "cs"
                  ? `${deposit.value} je přibližně ${ratio.toFixed(1).replace(".", ",")}× měsíční nájem. U nájmu bytu je potřeba ověřit limit jistoty a smluvní pokuty podle §2254 občanského zákoníku.`
                  : `${deposit.value} is about ${ratio.toFixed(1)}× monthly rent. For residential leases, verify the deposit and penalty cap under Section 2254 of the Czech Civil Code.`,
              action:
                state.lang === "cs"
                  ? "Požadujte snížení kauce nebo výslovné vysvětlení, že souhrn jistoty a smluvní pokuty nepřekračuje zákonný limit."
                  : "Ask to reduce the deposit or explain that deposit plus contractual penalty stays within the statutory cap.",
              source: "Občanský zákoník §2254",
              sourceUrl
            });
          } else {
            benchmarks.push({
              level: ratio > 2.5 ? "verify" : "ok",
              title: state.lang === "cs" ? "Kauce proti nájemnému" : "Deposit against rent",
              detail:
                state.lang === "cs"
                  ? `${deposit.value} je přibližně ${ratio.toFixed(1).replace(".", ",")}× měsíční nájem. Ověřte ještě vrácení kauce, započtení a termín vypořádání.`
                  : `${deposit.value} is about ${ratio.toFixed(1)}× monthly rent. Also verify return timing, deductions, and settlement.`,
              action:
                state.lang === "cs"
                  ? "Doplnit termín vrácení a přesné důvody, kdy lze kauci započíst."
                  : "Add return timing and exact reasons for deductions.",
              source: "Občanský zákoník §2254",
              sourceUrl
            });
          }
        }

        if (penaltySignal) {
          benchmarks.push({
            level: "verify",
            title: state.lang === "cs" ? "Sankce u nájmu bytu vyžaduje přesnou kontrolu" : "Residential lease penalty needs precise review",
            detail:
              state.lang === "cs"
                ? "Pokud je sankce smluvní pokutou, ověřte souhrn s kaucí podle §2254. Pokud jde o poplatek za prodlení, ověřte výpočet, strop a přiměřenost."
                : "If the sanction is a contractual penalty, verify the total with the deposit under Section 2254. If it is a late-payment fee, verify calculation, cap, and proportionality.",
            action:
              state.lang === "cs"
                ? "Doplnit strop sankce, výzvu před uplatněním a jasný způsob výpočtu."
                : "Add a cap, prior notice before enforcement, and clear calculation method.",
            source: "Občanský zákoník §2254",
            sourceUrl
          });
        }

        return benchmarks;
      }

      function issueDraftFor(id, contractType, role) {
        if (contractType === "lease") {
          const drafts = {
            payment:
              state.lang === "cs"
                ? "Navrhuji doplnit, že sankce při prodlení bude uplatněna až po písemné výzvě a přiměřené lhůtě k nápravě; souhrn sankcí bude mít předem stanovený strop."
                : "Add that late-payment sanctions apply only after written notice and a reasonable cure period, with a defined aggregate cap.",
            penalty:
              state.lang === "cs"
                ? "Smluvní pokuta musí mít přesný spouštěč, maximální strop a nesmí být uplatněna za nepodstatné porušení bez možnosti nápravy."
                : "The contractual penalty should have an exact trigger, maximum cap, and should not apply to minor breaches without a cure opportunity.",
            termination:
              state.lang === "cs"
                ? "Doplnit konkrétní výpovědní lhůtu, způsob doručení výpovědi a finanční vypořádání při skončení nájmu."
                : "Add the notice period, delivery method, and financial settlement on lease termination.",
            blank:
              state.lang === "cs"
                ? "Před podpisem doplnit všechny částky, datumy, přílohy a identifikaci bytu včetně sklepa, vybavení a měřidel."
                : "Before signing, complete all amounts, dates, attachments, and unit identification including storage, equipment, and meters.",
            "personal-data":
              state.lang === "cs"
                ? "Doplnit účel zpracování osobních údajů, dobu uchování a osoby, kterým mohou být údaje předány."
                : "Add processing purpose, retention period, and recipients of personal data."
          };
          return drafts[id] || (role === "tenant"
            ? state.lang === "cs"
              ? "Doplnit přesnou formulaci tak, aby byla povinnost nájemce měřitelná, přiměřená a časově omezená."
              : "Add precise wording so the tenant duty is measurable, proportionate, and time-limited."
            : state.lang === "cs"
              ? "Doplnit přesnou formulaci povinnosti, lhůtu a důsledek porušení."
              : "Add precise wording for the duty, deadline, and consequence of breach.");
        }
        return state.lang === "cs"
          ? "Doplnit přesnou formulaci, limit odpovědnosti, lhůtu a jasný postup při porušení."
          : "Add precise wording, liability limit, deadline, and a clear breach process.";
      }

      function buildIssues(findings, coverage, benchmarks, contractType, role) {
        const issues = [];
        benchmarks
          .filter((benchmark) => benchmark.level !== "ok")
          .forEach((benchmark) => {
            issues.push({
              priority: benchmark.level === "high" ? 3 : 2,
              title: benchmark.title,
              impact: benchmark.detail,
              ask: benchmark.action,
              quote: benchmark.source,
              draft: benchmark.action
            });
          });

        findings.slice(0, 5).forEach((finding) => {
          issues.push({
            priority: finding.level >= 17 ? 3 : finding.level >= 13 ? 2 : 1,
            title: finding.title,
            impact: finding.why,
            ask: actionForFinding(finding.id, contractType) || finding.recommendation,
            quote: finding.quote,
            draft: issueDraftFor(finding.id, contractType, role)
          });
        });

        coverage
          .filter((item) => item.required && !item.present)
          .slice(0, 4)
          .forEach((item) => {
            issues.push({
              priority: 2,
              title: state.lang === "cs" ? `Doplnit: ${item.label}` : `Add: ${item.label}`,
              impact:
                state.lang === "cs"
                  ? "Tato část není v textu jednoznačně nalezená, takže se po podpisu může hůř dokazovat."
                  : "This section is not clearly found in the text, so it may be harder to prove after signing.",
              ask: contractType === "lease" ? leaseActionForMissing(item.id) : (state.lang === "cs" ? `Doplnit nebo ověřit část: ${item.label}.` : `Add or verify: ${item.label}.`),
              quote: "",
              draft: contractType === "lease" ? leaseActionForMissing(item.id) : (state.lang === "cs" ? `Do smlouvy doplnit část "${item.label}" s konkrétní lhůtou, odpovědnou stranou a následkem porušení.` : `Add "${item.label}" with a concrete deadline, responsible party, and breach consequence.`)
            });
          });

        const seen = new Set();
        return issues
          .sort((a, b) => b.priority - a.priority)
          .filter((issue) => {
            const key = issue.title.toLowerCase();
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          })
          .slice(0, 6);
      }

      function buildVerdict(score, findings, benchmarks, issues, goal) {
        const hasHighBenchmark = benchmarks.some((benchmark) => benchmark.level === "high");
        const hasHighFinding = findings.some((finding) => finding.level >= 18 && finding.certainty === "confirmed");
        const needsLawyer = hasHighBenchmark || hasHighFinding || score < 55;
        const needsNegotiation = needsLawyer || issues.length >= 2 || score < 78;
        let title;
        let summary;
        let next;

        if (needsLawyer) {
          title = state.lang === "cs" ? "Nepodepisovat bez úprav" : "Do not sign without changes";
          summary =
            state.lang === "cs"
              ? "Smlouva obsahuje body, které mohou mít významný finanční nebo právní dopad. Použijte níže uvedené požadavky jako podklad pro úpravu nebo kontrolu advokátem."
              : "The contract contains points with material financial or legal impact. Use the requests below for amendment or lawyer review.";
          next = goal === "lawyer"
            ? state.lang === "cs" ? "Stáhněte podklady a pošlete je právníkovi s issue boardem." : "Download the pack and send it to a lawyer with the issue board."
            : state.lang === "cs" ? "Nejdřív pošlete protistraně vyjednávací text." : "First send the negotiation text to the other side.";
        } else if (needsNegotiation) {
          title = state.lang === "cs" ? "Vyjednat před podpisem" : "Negotiate before signing";
          summary =
            state.lang === "cs"
              ? "Nejde nutně o stopku, ale několik bodů má být přesnějších, měřitelných a časově omezených."
              : "This is not necessarily a stop sign, but several points should be more precise, measurable, and time-limited.";
          next = state.lang === "cs" ? "Zkopírujte vyjednávací text a vyřešte otevřené body před podpisem." : "Copy the negotiation text and resolve open points before signing.";
        } else {
          title = state.lang === "cs" ? "Lze podepsat po ruční kontrole" : "Likely signable after manual check";
          summary =
            state.lang === "cs"
              ? "Automatická kontrola nenašla silné signály. Před podpisem ještě ověřte identitu stran, částky, přílohy a podpisy."
              : "The automated check found no strong signals. Still verify parties, amounts, attachments, and signatures before signing.";
          next = state.lang === "cs" ? "Projděte peníze, termíny a přílohy." : "Review money, dates, and attachments.";
        }

        return { title, summary, next };
      }

      function buildNegotiationText(issues, reportMeta) {
        const top = issues.slice(0, 5);
        if (!top.length) {
          return state.lang === "cs"
            ? "Dobrý den, před podpisem prosím ještě o potvrzení částek, dat, příloh a podpisových údajů."
            : "Hello, before signing, please confirm the amounts, dates, attachments, and signing details.";
        }

        const intro =
          state.lang === "cs"
            ? `Dobrý den, před podpisem prosím o úpravu nebo vysvětlení těchto bodů (${typeLabel(reportMeta.type)}, pozice: ${roleLabel(reportMeta.role)}):`
            : `Hello, before signing, please amend or clarify these points (${typeLabel(reportMeta.type)}, position: ${roleLabel(reportMeta.role)}):`;
        const lines = top.map((issue, index) => `${index + 1}. ${issue.ask}`);
        const outro =
          state.lang === "cs"
            ? "Po zapracování těchto bodů můžeme smlouvu znovu projít a posunout k podpisu."
            : "After these points are addressed, we can review the contract again and move toward signing.";
        return [intro, ...lines, outro].join("\n");
      }

      function buildPriorities(findings, coverage) {
        const priorities = findings.slice(0, 3).map((finding) => ({
          title: finding.title,
          detail: finding.recommendation
        }));

        coverage
          .filter((item) => item.required && !item.present)
          .slice(0, Math.max(0, 3 - priorities.length))
          .forEach((item) => {
            priorities.push({
              title: `${t("missing")}: ${item.label}`,
              detail:
                state.lang === "cs"
                  ? "Doplňte nebo ověřte tuto část před podpisem."
                  : "Add or verify this section before signing."
            });
          });

        if (!priorities.length) {
          priorities.push({
            title: state.lang === "cs" ? "Rychlá ruční kontrola" : "Quick manual check",
            detail: t("noPriorities")
          });
        }

        return priorities;
      }

      function missingCountText(count) {
        if (state.lang !== "cs") return `${count} sections need verification.`;
        if (count === 1) return "Chybí ověřit 1 část.";
        if (count >= 2 && count <= 4) return `Chybí ověřit ${count} části.`;
        return `Chybí ověřit ${count} částí.`;
      }

      function buildProfessionalSummary(risk, findings, coverage) {
        const base = t(`summary${risk[0].toUpperCase()}${risk.slice(1)}`);
        const missingCount = coverage.filter((item) => item.required && !item.present).length;
        if (findings[0] && missingCount) {
          const lead = findings[0].certainty === "confirmed"
            ? state.lang === "cs" ? "Nejdřív řešit" : "First address"
            : state.lang === "cs" ? "Nejdřív ověřit" : "First verify";
          return state.lang === "cs"
            ? `${base} ${lead}: ${findings[0].title}. ${missingCountText(missingCount)}`
            : `${base} ${lead}: ${findings[0].title}. ${missingCountText(missingCount)}`;
        }
        if (findings[0]) {
          const lead = findings[0].certainty === "confirmed"
            ? state.lang === "cs" ? "Nejdřív řešit" : "First address"
            : state.lang === "cs" ? "Nejdřív ověřit" : "First verify";
          return state.lang === "cs"
            ? `${base} ${lead}: ${findings[0].title}.`
            : `${base} ${lead}: ${findings[0].title}.`;
        }
        if (missingCount) {
          return state.lang === "cs"
            ? `${base} ${missingCountText(missingCount)}`
            : `${base} ${missingCountText(missingCount)}`;
        }
        return base;
      }

      function analyze(text) {
        const normalized = cleanText(text).slice(0, 180000);
        const searchable = foldText(normalized);
        const contractType = detectType(searchable);
        const role = currentRole(contractType);
        const goal = $("reviewGoal").value;
        const findings = [];
        const seen = new Set();

        for (const rule of riskRules) {
          const matches = [...searchable.matchAll(rule.pattern)];
          if (matches.length && !seen.has(rule.id)) {
            seen.add(rule.id);
            const [title, recommendation] = rule[state.lang];
            findings.push({
              id: rule.id,
              area: rule.area,
              level: rule.level,
              title,
              recommendation,
              why: whyForFinding(rule.id),
              severity: severityLabel(rule.level),
              quote: excerpt(normalized, matches[0].index || 0),
              confidence: Math.min(0.92, 0.56 + matches.length * 0.08)
            });
          }
        }

        findings.sort((a, b) => b.level - a.level);
        findings.forEach((finding) => {
          finding.certainty = findingCertainty(finding);
        });
        const coverage = buildCoverage(normalized, contractType);
        const missingRequired = coverage.filter((item) => item.required && !item.present).length;
        const extracts = extractNumbersAndDates(normalized);
        const benchmarks = buildLegalBenchmarks(contractType, extracts, findings);
        const benchmarkPenalty = benchmarks.reduce((sum, item) => sum + (item.level === "high" ? 18 : item.level === "verify" ? 7 : 0), 0);
        const penalty = findings.reduce((sum, item) => sum + item.level, 0) + missingRequired * 4 + benchmarkPenalty;
        const score = Math.max(0, Math.min(100, 100 - penalty));
        const risk = score < 55 ? "high" : score < 78 ? "medium" : "low";
        const confidence = Math.min(
          0.94,
          0.52 + Math.min(normalized.length, 20000) / 100000 + findings.length * 0.035
        );
        const clauses = findClauses(normalized, contractType);
        const priorities = buildPriorities(findings, coverage);
        const scoreReasons = buildScoreReasons(findings, coverage, benchmarks);
        const actions = buildActions(findings, coverage, contractType);
        const questions = buildQuestions(findings, contractType, coverage);
        const issues = buildIssues(findings, coverage, benchmarks, contractType, role);
        const verdict = buildVerdict(score, findings, benchmarks, issues, goal);
        const negotiationText = buildNegotiationText(issues, { type: contractType, role });

        return {
          text: normalized,
          type: contractType,
          role,
          goal,
          findings,
          coverage,
          priorities,
          scoreReasons,
          actions,
          extracts,
          benchmarks,
          issues,
          verdict,
          negotiationText,
          clauses,
          questions,
          score,
          risk,
          confidence,
          summary: buildProfessionalSummary(risk, findings, coverage)
        };
      }

      function buildQuestions(findings, contractType, coverage) {
        const base =
          contractType === "lease"
            ? state.lang === "cs"
              ? [
                  "Kdy a za jakých podmínek se vrací kauce?",
                  "Jak se vyúčtují služby a které platby jsou paušální?",
                  "Jaká je výpovědní lhůta a co se stane při prodlení?",
                  "Kdo hradí opravy, běžnou údržbu a škody v bytě?"
                ]
              : [
                  "When and under what conditions is the deposit returned?",
                  "How are services settled and which payments are fixed?",
                  "What is the notice period and what happens after late payment?",
                  "Who pays for repairs, routine maintenance, and damage?"
                ]
            : state.lang === "cs"
              ? [
                  "Co přesně se stane při porušení smlouvy?",
                  "Jak lze smlouvu ukončit bez nepřiměřených nákladů?",
                  "Které přílohy a částky musí být doplněné před podpisem?"
                ]
              : [
                  "What exactly happens after a breach?",
                  "How can the contract be terminated without disproportionate cost?",
                  "Which attachments and amounts must be completed before signing?"
                ];

        if (contractType === "employment") {
          base.unshift(state.lang === "cs" ? "Sedí pracovní doba, mzda a konkurenční omezení?" : "Do working time, salary, and non-compete limits fit?");
        }

        coverage
          .filter((item) => item.required && !item.present)
          .slice(0, 2)
          .forEach((item) => {
            base.push(
              state.lang === "cs"
                ? `Kde je ve smlouvě upraveno: ${item.label}?`
                : `Where does the contract cover: ${item.label}?`
            );
          });

        findings.slice(0, 2).forEach((finding) => {
          base.push(
            state.lang === "cs"
              ? `Je bod "${finding.title}" vyvážený pro obě strany?`
              : `Is "${finding.title}" balanced for both parties?`
          );
        });
        return [...new Set(base)].slice(0, 6);
      }

      function riskLabel(risk) {
        if (risk === "high") return t("high");
        if (risk === "medium") return t("medium");
        return t("low");
      }

      function questionsTitle(type) {
        if (type === "lease") return state.lang === "cs" ? "Otázky pro pronajímatele" : "Questions for the landlord";
        return t("questions");
      }

      async function copyText(value) {
        if (navigator.clipboard?.writeText && window.isSecureContext) {
          await Promise.race([
            navigator.clipboard.writeText(value),
            new Promise((_, reject) => setTimeout(() => reject(new Error("clipboard timeout")), 1200))
          ]);
          return;
        }

        const area = document.createElement("textarea");
        area.value = value;
        area.setAttribute("readonly", "");
        area.style.position = "fixed";
        area.style.left = "-9999px";
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
      }

      function renderReport(report) {
        state.lastReport = report;
        $("emptyResult").classList.add("hidden");
        $("result").classList.remove("hidden");
        $("reportMeta").textContent = `${t("done")} · ${t("localMethod")}`;

        const priorities = report.priorities
          .map(
            (priority) => `
              <article class="priority">
                <strong>${escapeHtml(priority.title)}</strong>
                <span>${escapeHtml(priority.detail)}</span>
              </article>
            `
          )
          .join("");

        const scoreReasons = report.scoreReasons.length
          ? report.scoreReasons
              .map(
                (reason) => `
              <div class="mini">
                <strong>${escapeHtml(reason.label)}</strong>
                ${escapeHtml(reason.detail)}
              </div>
            `
              )
              .join("")
          : `<div class="mini">${escapeHtml(t("noScoreReasons"))}</div>`;

        const actions = report.actions
          .map((action) => `<div class="mini">${escapeHtml(action)}</div>`)
          .join("");

        const renderFindingList = (items, emptyText) =>
          items.length > 0
            ? items
                .map(
                  (finding) => `
              <article class="finding">
                <div class="finding-top">
                  <h3>${escapeHtml(finding.title)}</h3>
                  <span class="badge">${escapeHtml(finding.severity)} · ${Math.round(finding.confidence * 100)}%</span>
                </div>
                <p><strong>${escapeHtml(t("whyItMatters"))}:</strong> ${escapeHtml(finding.why)}</p>
                <p><strong>${escapeHtml(t("suggestedAction"))}:</strong> ${escapeHtml(finding.recommendation)}</p>
                <div class="quote"><strong>${escapeHtml(t("evidence"))}:</strong> ${escapeHtml(finding.quote)}</div>
              </article>
            `
                )
                .join("")
            : `<div class="mini">${escapeHtml(emptyText)}</div>`;

        const confirmed = report.findings.filter((finding) => finding.certainty === "confirmed");
        const possible = report.findings.filter((finding) => finding.certainty !== "confirmed");
        const findings = `
          <div class="finding-group">
            <div class="group-title">${escapeHtml(t("confirmedFindings"))}</div>
            ${renderFindingList(confirmed, t("noConfirmedFindings"))}
          </div>
          <div class="finding-group">
            <div class="group-title">${escapeHtml(t("possibleFindings"))}</div>
            ${renderFindingList(possible, t("noPossibleFindings"))}
          </div>
        `;

        const requiredCoverage = report.coverage.filter((item) => item.required);
        const foundRequired = requiredCoverage.filter((item) => item.present).length;
        const missingCoverage = requiredCoverage.filter((item) => !item.present);
        const coverageRows = missingCoverage.length
          ? missingCoverage.slice(0, 6).map((item) => ({
            label: `${t("missing")}: ${item.label}`,
            detail:
              state.lang === "cs"
                ? "Před podpisem ověřte nebo doplňte."
                : "Verify or add before signing."
          }))
          : [
              {
                label: `${t("present")}: ${foundRequired}/${requiredCoverage.length}`,
                detail:
                  state.lang === "cs"
                    ? "Základní části jsou v textu nalezené."
                    : "Core sections are present in the text."
              }
            ];
        const coverage = coverageRows
          .map(
            (item) => `
              <div class="mini">
                <strong>${escapeHtml(item.label)}</strong>
                ${escapeHtml(item.detail)}
              </div>
            `
          )
          .join("");

        const numbers = report.extracts.length
          ? report.extracts
              .slice(0, 8)
              .map(
                (item) => `
              <div class="number-card">
                <span>${escapeHtml(item.label)}</span>
                <strong>${escapeHtml(item.value)}</strong>
                <small>${escapeHtml(item.quote)}</small>
              </div>
            `
              )
              .join("")
          : `<div class="mini">${escapeHtml(t("noNumbers"))}</div>`;

        const benchmarks = report.benchmarks.length
          ? report.benchmarks
              .map(
                (item) => `
              <div class="benchmark">
                <strong>${escapeHtml(item.title)}</strong>
                ${escapeHtml(item.detail)}
                <div class="quote">
                  ${escapeHtml(t("source"))}: ${
                    item.sourceUrl
                      ? `<a href="${escapeHtml(item.sourceUrl)}" target="_blank" rel="noreferrer">${escapeHtml(item.source)}</a>`
                      : escapeHtml(item.source || "-")
                  }
                </div>
              </div>
            `
              )
              .join("")
          : `<div class="mini">${escapeHtml(t("noBenchmarks"))}</div>`;

        const issues = report.issues.length
          ? report.issues
              .map(
                (issue) => `
              <article class="issue-card">
                <div class="finding-top">
                  <h3>${escapeHtml(issue.title)}</h3>
                  <span class="badge">${issue.priority === 3 ? "P1" : issue.priority === 2 ? "P2" : "P3"}</span>
                </div>
                <p>${escapeHtml(issue.impact)}</p>
                <div class="ask-box">${escapeHtml(issue.ask)}</div>
                ${issue.quote ? `<div class="quote">${escapeHtml(issue.quote)}</div>` : ""}
              </article>
            `
              )
              .join("")
          : `<div class="mini">${escapeHtml(t("noFindings"))}</div>`;

        const edits = report.issues.length
          ? report.issues
              .slice(0, 4)
              .map((issue) => `<div class="draft-box"><strong>${escapeHtml(issue.title)}</strong>${escapeHtml(issue.draft)}</div>`)
              .join("")
          : `<div class="mini">${escapeHtml(t("noPriorities"))}</div>`;

        $("result").innerHTML = `
          <div class="score">
            <div class="score-ring">${report.score}</div>
            <div>
              <h4>${escapeHtml(t("verdictTitle"))}</h4>
              <h3>${escapeHtml(report.verdict.title)}</h3>
              <p>${escapeHtml(report.verdict.summary)}</p>
            </div>
          </div>

          <div class="meta">
            <div><span>${escapeHtml(t("type"))}</span><strong>${escapeHtml(typeLabel(report.type))}</strong></div>
            <div><span>${escapeHtml(t("roleLabel"))}</span><strong>${escapeHtml(roleLabel(report.role))}</strong></div>
            <div><span>${escapeHtml(t("confidence"))}</span><strong>${Math.round(report.confidence * 100)}%</strong></div>
            <div><span>${escapeHtml(t("chars"))}</span><strong>${report.text.length.toLocaleString()}</strong></div>
          </div>

          <h3 class="section-title">${escapeHtml(t("nextStep"))}</h3>
          <div class="mini"><strong>${escapeHtml(report.verdict.next)}</strong>${escapeHtml(report.summary)}</div>

          <h3 class="section-title">${escapeHtml(t("priorities"))}</h3>
          <div class="priority-list">${priorities}</div>

          <h3 class="section-title">${escapeHtml(t("moneyDates"))}</h3>
          <div class="number-grid">${numbers}</div>

          ${
            report.benchmarks.length
              ? `<h3 class="section-title">${escapeHtml(t("legalBenchmarks"))}</h3><div class="benchmark-list">${benchmarks}</div>`
              : ""
          }

          <h3 class="section-title">${escapeHtml(t("negotiationPack"))}</h3>
          <div class="draft-box">${escapeHtml(report.negotiationText).replace(/\n/g, "<br>")}</div>
          <div class="actions">
            <button type="button" class="btn" id="copyNegotiation">${escapeHtml(t("copyNegotiation"))}</button>
          </div>

          <h3 class="section-title">${escapeHtml(missingCoverage.length ? t("coverage") : t("contentCheck"))}</h3>
          <div class="coverage">${coverage}</div>

          <details class="mini">
            <summary>${escapeHtml(t("findings"))}</summary>
            <div class="findings">${findings}</div>
          </details>

          <h3 class="section-title">${escapeHtml(questionsTitle(report.type))}</h3>
          <div class="questions">
            ${report.questions.map((question) => `<div class="mini">${escapeHtml(question)}</div>`).join("")}
          </div>

          <div class="actions">
            <button type="button" class="btn" id="downloadReport">${escapeHtml(t("download"))}</button>
          </div>
        `;

        $("copyNegotiation").addEventListener("click", async () => {
          try {
            await copyText(report.negotiationText);
            $("copyNegotiation").textContent = t("copied");
          } catch {
            status(report.negotiationText, true, "busy");
          }
        });
        $("downloadReport").addEventListener("click", () => downloadReport(report));
      }

      function downloadReport(report) {
        const lines = [
          "AI ContractGuard",
          `${t("score")}: ${report.score}/100`,
          `${t("type")}: ${typeLabel(report.type)}`,
          `${t("roleLabel")}: ${roleLabel(report.role)}`,
          `${t("confidence")}: ${Math.round(report.confidence * 100)}%`,
          "",
          `${t("verdictTitle")}: ${report.verdict.title}`,
          report.verdict.summary,
          `${t("nextStep")}: ${report.verdict.next}`,
          "",
          t("priorities"),
          ...report.priorities.map((priority) => `- ${priority.title}: ${priority.detail}`),
          "",
          t("moneyDates"),
          ...(report.extracts.length ? report.extracts.map((item) => `- ${item.label}: ${item.value} (${item.quote})`) : [`- ${t("noNumbers")}`]),
          "",
          t("legalBenchmarks"),
          ...(report.benchmarks.length ? report.benchmarks.map((item) => `- ${item.title}: ${item.detail}`) : [`- ${t("noBenchmarks")}`]),
          "",
          t("negotiationPack"),
          report.negotiationText,
          "",
          t("findings"),
          ...report.findings.map(
            (finding) =>
              `- ${finding.title} (${certaintyLabel(finding.certainty)}, ${finding.severity}, ${Math.round(finding.confidence * 100)}%): ${finding.recommendation}`
          ),
          "",
          t("coverage"),
          ...report.coverage.map((item) => `- ${item.present ? t("present") : t("missing")}: ${item.label}`),
          "",
          t("questions"),
          ...report.questions.map((question) => `- ${question}`),
          "",
          state.lang === "cs" ? "Jen orientace. Nejde o právní radu." : "Orientation only. Not legal advice."
        ];
        const blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "contractguard-report.txt";
        link.click();
        URL.revokeObjectURL(url);
      }

      async function runAnalysis() {
        if (state.processing) return;

        if (!$("ack").checked) {
          setAckError(true);
          status(t("missingAck"), true, "error");
          return;
        }

        setAckError(false);

        try {
          setBusy(true, state.files.length ? t("extracting") : t("analyzing"));
          status(state.files.length ? t("extracting") : t("analyzing"), true, "busy");
          let text = $("contractText").value;
          if (state.files.length) {
            text = await extractFiles(state.files);
            state.extractedText = text;
            $("contractText").value = text;
          }

          text = cleanText(text);
          if (!text) {
            status(t("missingText"), true, "error");
            return;
          }
          if (text.length > 180000) {
            status(t("tooLarge"), true, "error");
            return;
          }

          setBusy(true, t("analyzing"));
          status(t("analyzing"), true, "busy");
          const report = analyze(text);
          renderReport(report);
          status("", false);
        } catch (error) {
          status(error instanceof Error ? error.message : "Error", true, "error");
        } finally {
          setBusy(false);
        }
      }

      function clearAll() {
        state.files = [];
        state.extractedText = "";
        state.lastReport = null;
        $("contractText").value = "";
        $("fileInput").value = "";
        $("photoInput").value = "";
        $("ack").checked = false;
        $("contractType").value = "auto";
        $("userRole").value = "auto";
        $("reviewGoal").value = "negotiate";
        $("result").classList.add("hidden");
        $("emptyResult").classList.remove("hidden");
        $("reportMeta").textContent = "-";
        setAckError(false);
        setBusy(false);
        renderFiles();
        status("", false);
      }

      document.querySelectorAll("[data-lang]").forEach((button) => {
        button.addEventListener("click", () => setLanguage(button.dataset.lang));
      });
      document.querySelectorAll("[data-mode]").forEach((button) => {
        button.addEventListener("click", () => setMode(button.dataset.mode));
      });

      $("fileInput").addEventListener("change", (event) => {
        state.files = Array.from(event.target.files || []);
        renderFiles();
        if (state.files.length) status(t("selectedReady"), true, "busy");
      });
      $("photoInput").addEventListener("change", (event) => {
        state.files = Array.from(event.target.files || []);
        renderFiles();
        if (state.files.length) status(t("selectedReady"), true, "busy");
      });

      ["fileMode", "photoMode"].forEach((id) => {
        const zone = $(id);
        zone.addEventListener("dragover", (event) => {
          event.preventDefault();
          zone.classList.add("drag");
        });
        zone.addEventListener("dragleave", () => zone.classList.remove("drag"));
        zone.addEventListener("drop", (event) => {
          event.preventDefault();
          zone.classList.remove("drag");
          state.files = Array.from(event.dataTransfer.files || []);
          renderFiles();
          if (state.files.length) status(t("selectedReady"), true, "busy");
        });
      });

      $("analyzeBtn").addEventListener("click", runAnalysis);
      $("clearBtn").addEventListener("click", clearAll);
      $("ack").addEventListener("change", () => {
        if ($("ack").checked) setAckError(false);
      });
      ["contractType", "userRole", "reviewGoal"].forEach((id) => {
        $(id).addEventListener("change", () => {
          if (!state.lastReport) return;
          state.lastReport = analyze(state.lastReport.text);
          renderReport(state.lastReport);
        });
      });

      setLanguage("cs");
    </script>
  </body>
</html>
