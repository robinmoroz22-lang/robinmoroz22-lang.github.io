<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="AI ContractGuard checks contract text and files locally in your browser. Orientation only, not legal advice."
    />
    <title>AI ContractGuard | Audicore</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23000000'/%3E%3Cpath d='M18 47 30 17h4l12 30h-6l-3-8H27l-3 8h-6Zm11-14h6l-3-8-3 8Z' fill='%23ffffff'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #030303;
        --panel: #080808;
        --panel-2: #0d0d0d;
        --line: #242424;
        --line-strong: #3a3a3a;
        --text: #f7f7f7;
        --muted: #9a9a9a;
        --soft: #626262;
        --danger: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      body {
        min-height: 100vh;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .shell {
        min-height: 100vh;
        padding: 16px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        max-width: 1180px;
        margin: 0 auto 14px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .mark {
        width: 24px;
        height: 24px;
        border: 1px solid var(--line-strong);
        border-radius: 6px;
        display: grid;
        place-items: center;
        color: var(--text);
        font-size: 13px;
        font-weight: 700;
      }

      .brand strong {
        display: block;
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
      }

      .brand span {
        display: none;
        color: var(--soft);
        font-size: 12px;
      }

      .lang {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2px;
        padding: 2px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .lang button {
        height: 30px;
        min-width: 42px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }

      .lang button.active {
        background: var(--text);
        color: #000;
      }

      .grid {
        display: grid;
        gap: 12px;
        max-width: 1180px;
        margin: 0 auto;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .panel-head {
        min-height: 54px;
        padding: 14px 14px 12px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .panel-head h1,
      .panel-head h2 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
      }

      .panel-head p {
        margin: 0;
        color: var(--soft);
        font-size: 12px;
      }

      .panel-body {
        padding: 14px;
      }

      .modes {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2px;
        padding: 2px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #000;
      }

      .modes button {
        height: 38px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
      }

      .modes button.active {
        background: var(--text);
        color: #000;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      label,
      .label {
        color: var(--muted);
        font-size: 13px;
      }

      textarea,
      select,
      input[type="text"] {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #000;
        color: var(--text);
        outline: 0;
      }

      textarea:focus,
      select:focus,
      input[type="text"]:focus {
        border-color: var(--text);
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.12);
      }

      textarea {
        min-height: 260px;
        resize: vertical;
        padding: 12px;
        line-height: 1.55;
        font-size: 14px;
      }

      select,
      input[type="text"] {
        height: 40px;
        padding: 0 10px;
      }

      .drop {
        margin-top: 12px;
        min-height: 152px;
        border: 1px dashed var(--line-strong);
        border-radius: 8px;
        background: #000;
        display: grid;
        place-items: center;
        padding: 18px;
        text-align: center;
      }

      .drop.drag {
        border-color: var(--text);
        background: #090909;
      }

      .drop strong {
        display: block;
        font-size: 14px;
        font-weight: 600;
      }

      .drop span {
        display: block;
        margin-top: 8px;
        color: var(--soft);
        font-size: 12px;
        line-height: 1.5;
      }

      .drop input {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
      }

      .file-list {
        display: grid;
        gap: 6px;
        margin-top: 10px;
      }

      .file-row,
      .notice,
      .status {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #000;
        padding: 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .status {
        margin-top: 12px;
      }

      .status.busy,
      .status.error {
        border-color: var(--line-strong);
        color: var(--text);
      }

      .file-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      .file-row span:first-child {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text);
      }

      .controls {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .check {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #000;
        padding: 10px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .check input {
        margin-top: 2px;
        accent-color: #fff;
      }

      .check.error {
        border-color: var(--text);
        color: var(--text);
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        margin-top: 12px;
      }

      .btn {
        height: 42px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: transparent;
        color: var(--text);
        font-weight: 600;
        font-size: 13px;
      }

      .btn.primary {
        border-color: var(--text);
        background: var(--text);
        color: #000;
      }

      .btn:disabled {
        cursor: not-allowed;
        border-color: var(--line);
        background: #111;
        color: #555;
      }

      .result-empty {
        min-height: 560px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: var(--soft);
        text-align: center;
        padding: 24px;
        line-height: 1.5;
      }

      .score {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 14px;
        align-items: center;
      }

      .score-ring {
        width: 86px;
        height: 86px;
        border: 1px solid var(--line-strong);
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 22px;
        font-weight: 700;
      }

      .score h3 {
        margin: 0;
        font-size: 18px;
      }

      .score h4 {
        margin: 0 0 4px;
        color: var(--soft);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .score p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        margin-top: 14px;
      }

      .meta div {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #000;
        padding: 10px;
      }

      .meta span {
        display: block;
        color: var(--soft);
        font-size: 11px;
      }

      .meta strong {
        display: block;
        margin-top: 4px;
        font-size: 13px;
      }

      .findings {
        display: grid;
        gap: 8px;
        margin-top: 14px;
      }

      .priority-list {
        display: grid;
        gap: 8px;
        margin-top: 14px;
      }

      .score-reasons,
      .action-list,
      .finding-group,
      .benchmark-list,
      .issue-list,
      .edit-list,
      .number-grid {
        display: grid;
        gap: 8px;
        margin-top: 14px;
      }

      .number-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .number-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #000;
        padding: 10px;
      }

      .number-card span {
        display: block;
        color: var(--soft);
        font-size: 11px;
      }

      .number-card strong {
        display: block;
        margin-top: 4px;
        font-size: 14px;
      }

      .number-card small {
        display: block;
        margin-top: 6px;
        color: var(--soft);
        font-size: 11px;
        line-height: 1.4;
      }

      .finding-group + .finding-group {
        margin-top: 16px;
      }

      .group-title {
        color: var(--text);
        font-size: 12px;
        font-weight: 700;
      }

      .priority {
        display: grid;
        gap: 6px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: #000;
        padding: 12px;
      }

      .priority strong {
        font-size: 13px;
      }

      .priority span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .finding {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #000;
        padding: 12px;
      }

      .issue-card {
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: #000;
        padding: 12px;
      }

      .issue-card h3 {
        margin: 0;
        font-size: 14px;
        line-height: 1.35;
      }

      .issue-card p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .ask-box,
      .draft-box {
        margin-top: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #050505;
        padding: 10px;
        color: var(--text);
        font-size: 13px;
        line-height: 1.5;
      }

      .draft-box {
        color: var(--muted);
      }

      .benchmark {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #000;
        padding: 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .benchmark strong {
        display: block;
        color: var(--text);
        margin-bottom: 4px;
      }

      .benchmark a {
        color: var(--text);
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .finding-top {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      .finding h3 {
        margin: 0;
        font-size: 14px;
        line-height: 1.35;
      }

      .badge {
        flex: 0 0 auto;
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        padding: 3px 8px;
        color: var(--muted);
        font-size: 11px;
      }

      .finding p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .quote {
        margin-top: 10px;
        border-left: 1px solid var(--line-strong);
        padding-left: 10px;
        color: var(--soft);
        font-size: 12px;
        line-height: 1.5;
      }

      .quote strong {
        color: var(--muted);
        font-weight: 650;
      }

      .coverage,
      .clauses,
      .questions {
        display: grid;
        gap: 8px;
        margin-top: 14px;
      }

      .finding p strong {
        color: var(--text);
        font-weight: 650;
      }

      .mini {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #000;
        padding: 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .mini strong {
        display: block;
        color: var(--text);
        margin-bottom: 4px;
      }

      .section-title {
        margin: 18px 0 8px;
        color: var(--text);
        font-size: 13px;
        font-weight: 700;
      }

      .hidden {
        display: none !important;
      }

      @media (min-width: 760px) {
        .brand span {
          display: block;
        }

        .grid {
          grid-template-columns: minmax(0, 1.05fr) minmax(340px, 0.95fr);
        }

        .actions {
          grid-template-columns: 1fr auto;
        }

        .meta {
          grid-template-columns: repeat(4, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="mark">A</div>
          <div>
            <strong>AI ContractGuard</strong>
            <span data-i18n="tagline">Lokální orientační kontrola smluv</span>
          </div>
        </div>
        <div class="lang" aria-label="Language">
          <button type="button" class="active" data-lang="cs">CZ</button>
          <button type="button" data-lang="en">EN</button>
        </div>
      </header>

      <section class="grid">
        <div class="panel">
          <div class="panel-head">
            <h1 data-i18n="inputTitle">Smlouva</h1>
            <p data-i18n="privacy">Lokálně v prohlížeči</p>
          </div>
          <div class="panel-body">
            <div class="modes" aria-label="Input mode">
              <button type="button" class="active" data-mode="text" data-i18n="modeText">
                Text
              </button>
              <button type="button" data-mode="file" data-i18n="modeFile">Soubor</button>
              <button type="button" data-mode="photo" data-i18n="modePhoto">Foto</button>
            </div>

            <div id="textMode" class="field">
              <label for="contractText" data-i18n="textLabel">Text smlouvy</label>
              <textarea
                id="contractText"
                spellcheck="false"
                data-i18n-placeholder="textPlaceholder"
                placeholder="Vložte text smlouvy..."
              ></textarea>
            </div>

            <label id="fileMode" class="drop hidden" for="fileInput">
              <input
                id="fileInput"
                type="file"
                multiple
                accept=".pdf,.doc,.docx,.odt,.rtf,.txt,.md,.html,.htm,.xml,.eml,.csv,.xls,.xlsx,.ods,.zip,image/jpeg,image/png,image/webp,image/heic,image/heif"
              />
              <span>
                <strong data-i18n="dropTitle">Vyberte nebo přetáhněte soubory</strong>
                <span data-i18n="dropHint">PDF, DOC(X), ODT, RTF, XLSX, ZIP, JPG, PNG</span>
              </span>
            </label>

            <label id="photoMode" class="drop hidden" for="photoInput">
              <input id="photoInput" type="file" accept="image/*" capture="environment" />
              <span>
                <strong data-i18n="photoTitle">Vyfotit smlouvu</strong>
                <span data-i18n="photoHint">OCR běží v prohlížeči, může být pomalejší.</span>
              </span>
            </label>

            <div id="fileList" class="file-list"></div>

            <div class="controls">
              <div class="field">
                <label for="contractType" data-i18n="typeLabel">Typ smlouvy</label>
                <select id="contractType">
                  <option value="auto" data-i18n="typeAuto">Automaticky</option>
                  <option value="employment" data-i18n="typeEmployment">Pracovní</option>
                  <option value="lease" data-i18n="typeLease">Nájemní</option>
                  <option value="nda" data-i18n="typeNda">NDA / mlčenlivost</option>
                  <option value="service" data-i18n="typeService">Dílo / služby</option>
                  <option value="purchase" data-i18n="typePurchase">Kupní</option>
                  <option value="loan" data-i18n="typeLoan">Půjčka / úvěr</option>
                  <option value="other" data-i18n="typeOther">Jiná</option>
                </select>
              </div>

              <div class="field">
                <label for="userRole" data-i18n="roleLabel">Moje pozice</label>
                <select id="userRole">
                  <option value="auto" data-i18n="roleAuto">Automaticky</option>
                  <option value="tenant" data-i18n="roleTenant">Nájemce</option>
                  <option value="landlord" data-i18n="roleLandlord">Pronajímatel</option>
                  <option value="employee" data-i18n="roleEmployee">Zaměstnanec</option>
                  <option value="employer" data-i18n="roleEmployer">Zaměstnavatel</option>
                  <option value="client" data-i18n="roleClient">Klient / objednatel</option>
                  <option value="supplier" data-i18n="roleSupplier">Dodavatel</option>
                  <option value="buyer" data-i18n="roleBuyer">Kupující</option>
                  <option value="seller" data-i18n="roleSeller">Prodávající</option>
                  <option value="borrower" data-i18n="roleBorrower">Dlužník</option>
                  <option value="lender" data-i18n="roleLender">Věřitel</option>
                </select>
              </div>

              <div class="field">
                <label for="reviewGoal" data-i18n="goalLabel">Cíl kontroly</label>
                <select id="reviewGoal">
                  <option value="negotiate" data-i18n="goalNegotiate">Vyjednat úpravy</option>
                  <option value="decide" data-i18n="goalDecide">Rychle rozhodnout</option>
                  <option value="lawyer" data-i18n="goalLawyer">Připravit pro právníka</option>
                  <option value="understand" data-i18n="goalUnderstand">Pochopit rizika</option>
                </select>
              </div>

              <label class="check">
                <input id="ack" type="checkbox" />
                <span data-i18n="ack">
                  Rozumím, že výstup je jen orientační automatická kontrola, ne právní rada.
                </span>
              </label>

              <div class="notice" data-i18n="notice">
                Soubory se neposílají na server. Citlivé smlouvy přesto kontrolujte opatrně.
              </div>
            </div>

            <div id="status" class="status hidden" aria-live="polite"></div>

            <div class="actions">
              <button id="analyzeBtn" type="button" class="btn primary" data-i18n="analyze">
                Analyzovat zdarma
              </button>
              <button id="clearBtn" type="button" class="btn" data-i18n="clear">Vymazat</button>
            </div>
          </div>
        </div>

        <aside class="panel">
          <div class="panel-head">
            <h2 data-i18n="reportTitle">Report</h2>
            <p id="reportMeta">-</p>
          </div>
          <div class="panel-body">
            <div id="emptyResult" class="result-empty" data-i18n="empty">
              Vložte smlouvu a spusťte analýzu.
            </div>
            <div id="result" class="hidden"></div>
          </div>
        </aside>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.9.1/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script>

      function status(message, show = true, kind = "info") {

      function formatBytes(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${Math.round(bytes / 1024)} KB`;
        return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
      }

      function renderFiles() {
        const root = $("fileList");
        root.innerHTML = "";
        state.files.forEach((file) => {
          const row = document.createElement("div");
          row.className = "file-row";
          row.innerHTML = `<span>${escapeHtml(file.name)}</span><span>${formatBytes(file.size)}</span>`;
          root.appendChild(row);
        });
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function cleanText(value) {
        return String(value || "")
          .replace(/\u0000/g, " ")
          .replace(/[ \t]+\n/g, "\n")
          .replace(/\n{4,}/g, "\n\n\n")
          .replace(/[ \t]{2,}/g, " ")
          .trim();
      }

      function maskSensitive(value) {
        return cleanText(String(value || ""))
          .replace(/\b(Pronaj(?:í|i)matel|N(?:á|a)jemce|Landlord|Tenant)\s*:\s*([A-ZÁ-Ž][\p{L}.'-]+(?:\s+[A-ZÁ-Ž][\p{L}.'-]+){0,3})/gu, "$1: [osoba]")
          .replace(/\b([A-Z0-9._%+-])[A-Z0-9._%+-]*(@[A-Z0-9.-]+\.[A-Z]{2,})\b/gi, "$1***$2")
          .replace(/\b([A-Z0-9._%+-])[A-Z0-9._%+-]*(@[A-Z0-9.-]+)(?=\.\.\.|[\s,;)]|$)/gi, "$1***$2")
          .replace(/\b\d{2}[0-5]\d[0-3]\d\/?\d{3,4}\b/g, "**/**/**/**")
          .replace(/\b\d{6}\/(?=\D|$)/g, "**/**/**/")
          .replace(/\b(\+420\s*)?\d{3}[\s.-]?\d{3}[\s.-]?\d{3}\b/g, "+420 *** *** ***");
      }

      function foldText(value) {
        return String(value || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[�]/g, "?")
          .toLowerCase();
      }

      function extension(fileName) {
        return String(fileName).toLowerCase().split(".").pop() || "";
      }

      function stripMarkup(value) {
        const doc = new DOMParser().parseFromString(String(value || ""), "text/html");
        return cleanText(doc.body?.textContent || String(value).replace(/<[^>]+>/g, " "));
      }

      function decodeBuffer(buffer, encoding) {
        try {
          return new TextDecoder(encoding, { fatal: false }).decode(buffer);
        } catch {
          return "";
        }
      }

      function readableScore(value) {
        const cleaned = String(value || "").replace(/[^\p{L}\p{N}\s.,;:!?()[\]\/\-+%§]/gu, " ");
        const words = cleaned.match(/[\p{L}\p{N}]{2,}/gu) || [];
        const noise = (cleaned.match(/[�\u0000-\u0008\u000b\u000c\u000e-\u001f]/g) || []).length;
        return words.length * 4 - noise * 10 + cleanText(cleaned).length / 120;
      }

      function bestTextFromBuffer(buffer) {
        const candidates = ["utf-8", "windows-1250", "windows-1252", "utf-16le"]
          .map((encoding) => decodeBuffer(buffer, encoding))
          .filter(Boolean)
          .map((text) => ({
            text: cleanText(
              text
                .replace(/[^\p{L}\p{N}\s.,;:!?()[\]\/\-+%§]/gu, " ")
                .replace(/\s{2,}/g, " ")
            ),
            score: readableScore(text)
          }))
          .sort((a, b) => b.score - a.score);

        return candidates[0]?.text || "";
      }

      async function readTextFile(file) {
        return cleanText(await file.text());
      }

      async function readHtmlFile(file) {
        return stripMarkup(await file.text());
      }

      function stripRtf(value) {
        return cleanText(
          String(value || "")
            .replace(/\\'[0-9a-fA-F]{2}/g, " ")
            .replace(/\\[a-z]+-?\d* ?/gi, " ")
            .replace(/[{}]/g, " ")
        );
      }

      async function readRtfFile(file) {
        return stripRtf(await file.text());
      }

      async function readLegacyDoc(file) {
        return bestTextFromBuffer(await file.arrayBuffer());
      }

      async function readSpreadsheet(file) {
        if (!window.XLSX) throw new Error("Spreadsheet parser is not loaded.");
        const workbook = window.XLSX.read(await file.arrayBuffer(), { type: "array" });
        const parts = workbook.SheetNames.slice(0, 12).map((name) => {
          const sheet = workbook.Sheets[name];
          return window.XLSX.utils.sheet_to_csv(sheet, { blankrows: false });
        });
        return cleanText(parts.join("\n\n"));
      }

      async function readPdf(file) {
        const pdfjs = await import("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs");
        pdfjs.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.worker.min.mjs";
        const buffer = await file.arrayBuffer();
        const pdf = await pdfjs.getDocument({ data: buffer }).promise;
        const pages = [];
        const maxPages = Math.min(pdf.numPages, 80);
        for (let pageNumber = 1; pageNumber <= maxPages; pageNumber += 1) {
          const page = await pdf.getPage(pageNumber);
          const content = await page.getTextContent();
          pages.push(content.items.map((item) => item.str || "").join(" "));
        }
        return cleanText(pages.join("\n\n"));
      }

      async function readDocx(file) {
        if (!window.mammoth) throw new Error("DOCX parser is not loaded.");
        const result = await window.mammoth.extractRawText({
          arrayBuffer: await file.arrayBuffer()
        });
        return cleanText(result.value || "");
      }

      async function readOdt(file) {
        if (!window.JSZip) throw new Error("ODT parser is not loaded.");
        const zip = await window.JSZip.loadAsync(await file.arrayBuffer());
        const content = zip.file("content.xml");
        if (!content) return "";
        return stripMarkup(await content.async("text"));
      }

      async function readImage(file) {
        if (!window.Tesseract) throw new Error("OCR is not loaded.");
        setBusy(true, t("ocr"));
        status(t("ocr"), true, "busy");
        try {
          const result = await window.Tesseract.recognize(file, "ces+eng", {
            logger: () => {}
          });
          return cleanText(result?.data?.text || "");
        } catch {
          const result = await window.Tesseract.recognize(file, "eng", {
            logger: () => {}
          });
          return cleanText(result?.data?.text || "");
        }
      }

      async function readZip(file) {
        if (!window.JSZip) throw new Error("ZIP parser is not loaded.");
        const zip = await window.JSZip.loadAsync(await file.arrayBuffer());
        const parts = [];
        const entries = Object.values(zip.files)
          .filter((entry) => !entry.dir)
          .slice(0, 40);

        for (const entry of entries) {
          const ext = extension(entry.name);
          if (["txt", "md", "csv", "eml"].includes(ext)) {
            parts.push(await entry.async("text"));
          } else if (ext === "rtf") {
            parts.push(stripRtf(await entry.async("text")));
          } else if (["html", "htm", "xml"].includes(ext)) {
            parts.push(stripMarkup(await entry.async("text")));
          } else if (ext === "doc") {
            parts.push(bestTextFromBuffer(await entry.async("arraybuffer")));
          } else if (["xls", "xlsx", "ods"].includes(ext)) {
            const blob = new File([await entry.async("arraybuffer")], entry.name);
            parts.push(await readSpreadsheet(blob));
          } else if (ext === "docx") {
            const blob = new File([await entry.async("arraybuffer")], entry.name);
            parts.push(await readDocx(blob));
          } else if (ext === "odt") {
            const blob = new File([await entry.async("arraybuffer")], entry.name);
            parts.push(await readOdt(blob));
          } else if (ext === "pdf") {
            const blob = new File([await entry.async("arraybuffer")], entry.name, {
              type: "application/pdf"
            });
            parts.push(await readPdf(blob));
          }
        }

        return cleanText(parts.join("\n\n"));
      }

      async function extractFiles(files) {
        const parts = [];
        const failures = [];
        for (const file of files) {
          try {
            const ext = extension(file.name);
            let extracted = "";
            if (file.size > 20 * 1024 * 1024) {
              failures.push(`${file.name}: >20 MB`);
            } else if (["txt", "md", "csv", "eml"].includes(ext)) {
              extracted = await readTextFile(file);
            } else if (ext === "rtf") {
              extracted = await readRtfFile(file);
            } else if (["html", "htm", "xml"].includes(ext)) {
              extracted = await readHtmlFile(file);
            } else if (ext === "doc") {
              extracted = await readLegacyDoc(file);
            } else if (["xls", "xlsx", "ods"].includes(ext)) {
              extracted = await readSpreadsheet(file);
            } else if (ext === "pdf" || file.type === "application/pdf") {
              extracted = await readPdf(file);
            } else if (ext === "docx") {
              extracted = await readDocx(file);
            } else if (ext === "odt") {
              extracted = await readOdt(file);
            } else if (ext === "zip") {
              extracted = await readZip(file);
            } else if (file.type.startsWith("image/")) {
              extracted = await readImage(file);
            } else {
              failures.push(`${file.name}: unsupported`);
            }

            if (cleanText(extracted)) {
              parts.push(extracted);
            } else if (!failures.some((item) => item.startsWith(`${file.name}:`))) {
              failures.push(`${file.name}: empty text`);
            }
          } catch (error) {
            failures.push(
              `${file.name}: ${error instanceof Error ? error.message : "unknown"}`
            );
          }
        }

        const text = cleanText(parts.join("\n\n"));
        if (!text) {
          const detail = failures.length ? ` (${failures[0]})` : "";
          throw new Error(`${t("noReadableText")}${detail}`);
        }

        if (failures.length) {
          status(`${t("readFailed")}: ${failures[0]}`, true, "error");
        }

        return text;
      }

      function detectType(text) {
        const manual = $("contractType").value;
        if (manual !== "auto") return manual;

        let best = ["other", 0];
        for (const [type, pattern] of typePatterns) {
          const count = [...text.matchAll(pattern)].length;
          if (count > best[1]) best = [type, count];
        }
        return best[0];
      }

      function typeLabel(type) {
        const map = {
          employment: t("typeEmployment"),
          lease: t("typeLease"),
          nda: t("typeNda"),
          service: t("typeService"),
          purchase: t("typePurchase"),
          loan: t("typeLoan"),
          other: t("typeOther")
        };
        return map[type] || map.other;
      }

      function currentRole(contractType) {
        const value = $("userRole").value;
        if (value !== "auto") return value;
        if (contractType === "lease") return "tenant";
        if (contractType === "employment") return "employee";
        if (contractType === "service") return "client";
        if (contractType === "purchase") return "buyer";
        if (contractType === "loan") return "borrower";
        return "client";
      }

      function roleLabel(role) {
        const map = {
          tenant: t("roleTenant"),
          landlord: t("roleLandlord"),
          employee: t("roleEmployee"),
          employer: t("roleEmployer"),
          client: t("roleClient"),
          supplier: t("roleSupplier"),
          buyer: t("roleBuyer"),
          seller: t("roleSeller"),
          borrower: t("roleBorrower"),
          lender: t("roleLender")
        };
        return map[role] || t("roleAuto");
      }

      function excerpt(text, index) {
        const safeIndex = Math.max(0, Math.min(index || 0, text.length));
        const before = text.slice(Math.max(0, safeIndex - 140), safeIndex);
        const after = text.slice(safeIndex, Math.min(text.length, safeIndex + 190));
        const isBreak = (value, position) => {
          const char = value[position];
          if (!/[.!?\n]/.test(char)) return false;
          if (char === "." && /[\p{L}\p{N}]/u.test(value[position - 1] || "") && /[\p{L}\p{N}]/u.test(value[position + 1] || "")) return false;
          return true;
        };
        let leftBreak = -1;
        for (let i = before.length - 1; i >= 0; i -= 1) {
          if (isBreak(before, i)) {
            leftBreak = i;
            break;
          }
        }
        let rightBreak = -1;
        for (let i = 0; i < after.length; i += 1) {
          if (isBreak(after, i)) {
            rightBreak = i;
            break;
          }
        }
        const start = Math.max(0, safeIndex - before.length + (leftBreak >= 0 ? leftBreak + 1 : 0));
        const end = Math.min(text.length, safeIndex + (rightBreak >= 0 ? rightBreak + 1 : after.length));
        let value = cleanText(text.slice(start, end));

        if (value.length > 230) {
          const shortStart = Math.max(0, safeIndex - 70);
          const shortEnd = Math.min(text.length, safeIndex + 135);
          value = `${shortStart > 0 ? "..." : ""}${cleanText(text.slice(shortStart, shortEnd))}${shortEnd < text.length ? "..." : ""}`;
        } else {
          value = `${start > 0 ? "..." : ""}${value}${end < text.length ? "..." : ""}`;
        }

        return maskSensitive(value);
      }

      function findClauses(text, contractType) {
        const folded = foldText(text);
        const targeted =
          contractType === "lease"
            ? [
                { type: "parties", pattern: /pronaj.{0,2}matel|n.?jemce|rodn.{0,2}\s+.{0,2}slo|email/ },
                { type: "lease-unit", pattern: /byt|jednotka|sklep|balkon|podlahov|nemovitost/ },
                { type: "payment", pattern: /n.?jemn.{0,4}\s+(cin|ve\s+vysi|je|za|mesic|uhrad|plat)|splatnost|rent/ },
                { type: "services", pattern: /slu.{0,2}b|z.{0,2}loh|vodne|stocne|energie|teplo/ },
                { type: "deposit", pattern: /kauce|jistota|deposit/ },
                { type: "sanctions", pattern: /prodlen|sankc|pokut|\b1\s*%\s+z\s+dlu.{0,2}n/ },
                { type: "handover", pattern: /pred.{0,3}n|p.{0,2}ed.{0,3}n|protokol|oprav|.{0,2}dr.{0,2}b/ },
                { type: "use", pattern: /u.{0,2}iv|podnajem|podn.?jem|jine\s+osoby|souhlas\s+pronaj.{0,2}matele/ },
                { type: "termination", pattern: /ukon.{0,3}en|vypov|v.{0,2}pov|odstoupen/ }
              ]
            : [
                { type: "parties", pattern: /smluvn.?i?\s+stran|mezi|party|parties|between/ },
                { type: "payment", pattern: /cena|odmena|splatnost|faktur|payment|price|fee|invoice/ },
                { type: "termination", pattern: /ukon.{0,3}en|vypov|termination|notice|withdraw/ },
                { type: "liability", pattern: /odpov.{0,4}dnost|nahrada\s+skody|liability|damage/ },
                { type: "data", pattern: /osobn.{0,3}\s+.?daj|gdpr|personal\s+data|privacy/ }
              ];

        const found = [];
        const used = new Set();
        for (const item of targeted) {
          const match = folded.match(item.pattern);
          if (!match || used.has(item.type)) continue;
          used.add(item.type);
          found.push({
            type: item.type,
            title: clauseTitle(item.type),
            excerpt: excerpt(text, match.index || 0)
          });
          if (found.length >= 5) return found;
        }
        if (found.length) return found;

        const chunks = text
          .split(/\n\s*\n|(?=\b\d+[\).\s])|(?=\b[A-ZÁ-Ž][A-ZÁ-Ž ]{5,}\b)/)
          .map(cleanText)
          .filter((part) => part.length > 80)
          .slice(0, 10);

        const seen = new Set();
        return chunks
          .map((part) => {
            const type = detectClauseType(part);
            return {
              type,
              title: clauseTitle(type),
              excerpt: excerpt(part, 0)
            };
          })
          .filter((clause) => {
            const key = `${clause.type}:${clause.excerpt.slice(0, 40)}`;
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          })
          .slice(0, 5);
      }

      function detectClauseType(value) {
        const folded = foldText(value);
        if (/byt|jednotka|sklep|podlahov|adresa|balkon|nemovitost/.test(folded)) return "lease-unit";
        if (/kauce|jistota|deposit/.test(folded)) return "deposit";
        if (/slu.{0,2}b|z.{0,2}loh|vodne|stocne|teplo|energie|poplatk/.test(folded)) return "services";
        if (/n.?jemn.|splatnost|payment|invoice|faktur|rent/.test(folded)) return "payment";
        if (/poru.{0,2}en|pokut|prodlen|sankc|\b1\s*%\s+z\s+dlu.{0,2}n/.test(folded)) return "sanctions";
        if (/oprav|.{0,2}dr.{0,2}b|pred.{0,3}n|p.{0,2}ed.{0,3}n|stav\s+bytu|handover|repair/.test(folded)) return "handover";
        if (/u.{0,2}iv|podnajem|podn.?jem|souhlas\s+pronaj.{0,2}matele|jine\s+osoby/.test(folded)) return "use";
        if (/pronaj.{0,2}matel|n.?jemce|rodn.{0,2}\s+.{0,2}slo|email|bytem|party|parties/.test(folded)) return "parties";
        if (/odpov.{0,4}dnost|liability|damage/.test(folded)) return "liability";
        if (/ukon.{0,3}en|vypov|termination/.test(folded)) return "termination";
        if (/osobn.{0,3}\s+.?daj|gdpr|personal\s+data/.test(folded)) return "data";
        return "general";
      }

      function clauseTitle(type) {
        const labels = {

      }

      function buildCoverage(text, contractType) {
        const folded = foldText(text);
        return sectionDefinitions(contractType).map((section) => ({
          id: section.id,
          label: section[state.lang],
          required: section.required,
          present: section.patterns.some((pattern) => pattern.test(folded))
        }));
      }

      function findingCertainty(finding) {
        if (finding.confidence >= 0.76 || finding.level >= 16) return "confirmed";
        return "possible";
      }

      function certaintyLabel(certainty) {
        return certainty === "confirmed" ? t("confirmedFindings") : t("possibleFindings");
      }

      function pointsLabel(points) {
        if (state.lang !== "cs") return `${points} pts`;
        if (points === 1) return "1 bod";
        if (points >= 2 && points <= 4) return `${points} body`;
        return `${points} bodů`;
      }

      function buildScoreReasons(findings, coverage, benchmarks = []) {
        const reasons = benchmarks
          .filter((benchmark) => benchmark.level !== "ok")
          .slice(0, 2)
          .map((benchmark) => ({
            label: benchmark.title,
            detail: benchmark.level === "high"
              ? state.lang === "cs" ? "-18 bodů · právní benchmark" : "-18 pts · legal benchmark"
              : state.lang === "cs" ? "-7 bodů · ověřit podle benchmarku" : "-7 pts · verify against benchmark"
          }));

        findings.slice(0, Math.max(0, 3 - reasons.length)).forEach((finding) => {
          reasons.push({
          label: finding.title,
          detail:
            state.lang === "cs"
              ? `-${pointsLabel(finding.level)} · ${certaintyLabel(finding.certainty).toLowerCase()}`
              : `-${pointsLabel(finding.level)} · ${certaintyLabel(finding.certainty).toLowerCase()}`
          });
        });

        coverage
          .filter((item) => item.required && !item.present)
          .slice(0, Math.max(0, 4 - reasons.length))
          .forEach((item) => {
            reasons.push({
              label: state.lang === "cs" ? `Chybí: ${item.label}` : `Missing: ${item.label}`,
              detail: state.lang === "cs" ? "-4 body · chybí ve smlouvě" : "-4 pts · missing section"
            });
          });

        return reasons.slice(0, 4);
      }

      function leaseActionForMissing(id) {
        const actions = {
          deposit: {
            cs: "Doplňte, kdy a v jaké výši se vrací kauce a za co ji může pronajímatel započíst.",
            en: "Add when and how the deposit is returned and what the landlord may deduct."
          },
          services: {

          },
          rent: {

          },

          },
